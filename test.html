<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Make it Crisp — Tests</title>
<style>
  body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #eee; }
  .pass { color: #0f0; } .fail { color: #f44; } .info { color: #888; }
  h2 { margin-top: 24px; color: #eeff00; }
</style>
</head>
<body>
<h1>Make it Crisp — Test Suite</h1>
<div id="results"></div>

<script>
const results = document.getElementById('results');
let passed = 0, failed = 0;

function log(msg, cls = 'info') {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = msg;
  results.appendChild(d);
}

function assert(name, condition) {
  if (condition) { passed++; log(`✓ ${name}`, 'pass'); }
  else { failed++; log(`✗ ${name}`, 'fail'); }
}

function section(name) {
  const h = document.createElement('h2');
  h.textContent = name;
  results.appendChild(h);
}

// ── Load the main page in an iframe to test ──
const iframe = document.createElement('iframe');
iframe.style.display = 'none';
iframe.src = 'index.html';
document.body.appendChild(iframe);

iframe.onload = () => {
  const doc = iframe.contentDocument;
  const win = iframe.contentWindow;

  // ══════════════════════════════════
  section('DOM Structure');
  // ══════════════════════════════════
  assert('App container exists', !!doc.getElementById('app'));
  assert('Artboard exists', !!doc.getElementById('artboard'));
  assert('Canvas wrap exists', !!doc.getElementById('canvas-wrap'));
  assert('Output SVG exists', !!doc.getElementById('outputSvg'));
  assert('Preview SVG exists', !!doc.getElementById('previewSvg'));
  assert('Upload prompt exists', !!doc.getElementById('upload-prompt'));
  assert('File input exists', !!doc.getElementById('fileInput'));
  assert('File input accepts .svg', doc.getElementById('fileInput').accept === '.svg');
  assert('Logo wrap exists', !!doc.getElementById('logo-wrap'));
  assert('Logo link exists', !!doc.getElementById('logo'));
  assert('Logo links to khorei.com', doc.getElementById('logo').href.includes('khorei.com'));
  assert('Mode button A exists', !!doc.getElementById('btnA'));
  assert('Mode button B exists', !!doc.getElementById('btnB'));
  assert('Random button exists', !!doc.getElementById('randomBtn'));
  assert('Upload button exists', !!doc.getElementById('uploadBtn'));
  assert('Reset button exists', !!doc.getElementById('resetBtn'));
  assert('Download button exists', !!doc.getElementById('downloadBtn'));
  assert('Panel A exists', !!doc.getElementById('panel-a'));
  assert('Panel B exists', !!doc.getElementById('panel-b'));
  assert('Copyright exists', !!doc.getElementById('copyright'));
  assert('Copyright year is current', doc.getElementById('copy-year').textContent === String(new Date().getFullYear()));

  // ══════════════════════════════════
  section('Sliders');
  // ══════════════════════════════════
  const sliderIds = ['trackPowerA', 'thumbPowerA', 'fillPowerA', 'trackCrisp', 'thumbCrisp', 'fillCrisp',
                     'trackPowerB', 'thumbPowerB', 'fillPowerB', 'trackJagged', 'thumbJagged', 'fillJagged'];
  sliderIds.forEach(id => assert(`Slider element ${id} exists`, !!doc.getElementById(id)));

  // ══════════════════════════════════
  section('Initial State');
  // ══════════════════════════════════
  assert('Mode A is active by default', doc.getElementById('btnA').classList.contains('active'));
  assert('Mode B is not active', !doc.getElementById('btnB').classList.contains('active'));
  assert('Panel A is visible', doc.getElementById('panel-a').style.display !== 'none');
  assert('Panel B is hidden', doc.getElementById('panel-b').style.display === 'none');
  assert('Randomizer is disabled', doc.getElementById('randomBtn').classList.contains('disabled'));
  assert('Upload prompt is visible', !doc.getElementById('upload-prompt').classList.contains('hidden'));
  assert('Cursor is hammer', doc.getElementById('canvas-wrap').classList.contains('cursor-hammer'));

  // ══════════════════════════════════
  section('Mode Toggle');
  // ══════════════════════════════════
  doc.getElementById('btnB').click();
  assert('After clicking B: B is active', doc.getElementById('btnB').classList.contains('active'));
  assert('After clicking B: A is not active', !doc.getElementById('btnA').classList.contains('active'));
  assert('After clicking B: Panel B visible', doc.getElementById('panel-b').style.display !== 'none');
  assert('After clicking B: Panel A hidden', doc.getElementById('panel-a').style.display === 'none');
  assert('After clicking B: cursor is knife', doc.getElementById('canvas-wrap').classList.contains('cursor-knife'));

  doc.getElementById('btnA').click();
  assert('After clicking A: A is active again', doc.getElementById('btnA').classList.contains('active'));
  assert('After clicking A: cursor is hammer', doc.getElementById('canvas-wrap').classList.contains('cursor-hammer'));

  // ══════════════════════════════════
  section('JS Functions');
  // ══════════════════════════════════
  assert('rand() is a function', typeof win.rand === 'function');
  assert('rand(0,1) returns 0-1', (() => { const r = win.rand(0, 1); return r >= 0 && r <= 1; })());
  assert('rand(5,10) returns 5-10', (() => { const r = win.rand(5, 10); return r >= 5 && r <= 10; })());

  assert('convexHull() is a function', typeof win.convexHull === 'function');
  const hull = win.convexHull([[0,0],[1,0],[0,1],[1,1],[0.5,0.5]]);
  assert('convexHull returns 4 points for square+center', hull.length === 4);

  assert('hullArea() is a function', typeof win.hullArea === 'function');
  const area = win.hullArea([[0,0],[1,0],[1,1],[0,1]]);
  assert('hullArea of unit square = 1', Math.abs(area - 1) < 0.001);

  assert('getVoronoiCells() is a function', typeof win.getVoronoiCells === 'function');
  const cells = win.getVoronoiCells([[25,25],[75,75]], 100, 100, 10);
  assert('getVoronoiCells returns 2 cells', cells.length === 2);
  assert('Both cells have points', cells[0].length > 0 && cells[1].length > 0);

  assert('mapVal() is a function', typeof win.mapVal === 'function');
  assert('mapVal(0, 10, 20) = 10', win.mapVal(0, 10, 20) === 10);
  assert('mapVal(1, 10, 20) = 20', win.mapVal(1, 10, 20) === 20);
  assert('mapVal(0.5, 0, 100) = 50', win.mapVal(0.5, 0, 100) === 50);

  assert('getScale() is a function', typeof win.getScale === 'function');
  assert('getOff() is a function', typeof win.getOff === 'function');

  assert('generateJaggedPolygon() is a function', typeof win.generateJaggedPolygon === 'function');
  const poly = win.generateJaggedPolygon(6, 10);
  assert('generateJaggedPolygon returns 6 vertices', poly.length === 6);
  assert('Each vertex is [x,y]', poly.every(v => v.length === 2 && typeof v[0] === 'number'));

  assert('sampleColor() is a function', typeof win.sampleColor === 'function');
  assert('sampleColor without data returns fallback', win.sampleColor(0, 0) === '#555555');

  // ══════════════════════════════════
  section('SVG Upload Simulation');
  // ══════════════════════════════════
  const testSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="red"/></svg>';

  // Simulate upload
  win.originalSvgContent = testSvg;
  win.parsedSvgDoc = new DOMParser().parseFromString(testSvg, 'image/svg+xml');
  win.svgW = 100;
  win.svgH = 100;
  win.resetState();

  assert('After simulated upload: outputSvg has children', doc.getElementById('outputSvg').childNodes.length > 0);
  assert('After simulated upload: SVG has correct viewBox', doc.getElementById('outputSvg').getAttribute('viewBox') !== null);

  // Test getScale with known dimensions
  const scale = win.getScale();
  assert('getScale returns positive number', scale > 0 && scale <= 1);

  const off = win.getOff(scale);
  assert('getOff returns offX and offY', typeof off.offX === 'number' && typeof off.offY === 'number');

  // ══════════════════════════════════
  section('SVG with Embedded Image');
  // ══════════════════════════════════
  const bitmapSvg = '<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 100"><image xlink:href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" width="100" height="100"/></svg>';

  win.originalSvgContent = bitmapSvg;
  win.parsedSvgDoc = new DOMParser().parseFromString(bitmapSvg, 'image/svg+xml');
  win.svgW = 100;
  win.svgH = 100;
  win.resetState();

  const outputContent = doc.getElementById('outputSvg');
  const imageEl = outputContent.querySelector('image');
  assert('Bitmap SVG: <image> element preserved', !!imageEl);
  if (imageEl) {
    const href = imageEl.getAttribute('href') || imageEl.getAttributeNS('http://www.w3.org/1999/xlink', 'href');
    assert('Bitmap SVG: xlink:href preserved with data: URI', href && href.startsWith('data:image/png'));
  }

  // ══════════════════════════════════
  section('Crush (Mode A) Simulation');
  // ══════════════════════════════════
  const crushSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect width="200" height="200" fill="blue"/></svg>';
  win.originalSvgContent = crushSvg;
  win.parsedSvgDoc = new DOMParser().parseFromString(crushSvg, 'image/svg+xml');
  win.svgW = 200;
  win.svgH = 200;
  win.resetState();
  doc.getElementById('btnA').click();

  win.triggerModeA(100, 100);
  assert('After crush: particles array has entries', win.particles.length > 0);
  assert('After crush: fragment divs created', doc.querySelectorAll('.fragment-div').length > 0);
  assert('After crush: voronoiPointsA populated', win.voronoiPointsA.length > 0);

  // Check particle structure
  const p = win.particles[0];
  assert('Particle has el', !!p.el);
  assert('Particle has position (px, py)', typeof p.px === 'number' && typeof p.py === 'number');
  assert('Particle has velocity (vx, vy)', typeof p.vx === 'number' && typeof p.vy === 'number');
  assert('Particle has rotation', typeof p.rot === 'number');
  assert('Particle has scale factor', typeof p.sf === 'number' && p.sf > 0);

  // ══════════════════════════════════
  section('Slice (Mode B) Simulation');
  // ══════════════════════════════════
  win.originalSvgContent = crushSvg;
  win.parsedSvgDoc = new DOMParser().parseFromString(crushSvg, 'image/svg+xml');
  win.svgW = 200;
  win.svgH = 200;
  win.resetState();
  doc.getElementById('btnB').click();

  const scaleB = win.getScale();
  const offB = win.getOff(scaleB);
  win.triggerModeB(
    { x: offB.offX, y: offB.offY + 100 * scaleB },
    { x: offB.offX + 200 * scaleB, y: offB.offY + 100 * scaleB }
  );
  assert('After slice: particles created', win.particles.length > 0);
  assert('After slice: allBreakPts populated', win.allBreakPts.length > 0);

  // Reset back to mode A
  doc.getElementById('btnA').click();

  // ══════════════════════════════════
  section('Meta Tags');
  // ══════════════════════════════════
  assert('Favicon link exists', !!doc.querySelector('link[rel="icon"]'));
  assert('Apple touch icon exists', !!doc.querySelector('link[rel="apple-touch-icon"]'));
  assert('OG title exists', !!doc.querySelector('meta[property="og:title"]'));
  assert('OG image exists', !!doc.querySelector('meta[property="og:image"]'));
  assert('Twitter card exists', !!doc.querySelector('meta[name="twitter:card"]'));
  assert('Viewport meta exists', !!doc.querySelector('meta[name="viewport"]'));

  // ══════════════════════════════════
  section('CSS Variables');
  // ══════════════════════════════════
  const rootStyle = win.getComputedStyle(doc.documentElement);
  assert('--bg is defined', rootStyle.getPropertyValue('--bg').trim() !== '');
  assert('--accent is defined', rootStyle.getPropertyValue('--accent').trim() !== '');
  assert('--mono is defined', rootStyle.getPropertyValue('--mono').trim() !== '');

  // ══════════════════════════════════
  section('Accessibility');
  // ══════════════════════════════════
  assert('Logo images have alt text', Array.from(doc.querySelectorAll('#logo img')).every(img => img.alt));
  assert('Nav button images have alt text', Array.from(doc.querySelectorAll('.nav-btn img')).every(img => img.alt));
  assert('HTML lang attribute set', doc.documentElement.lang === 'en');

  // ══════════════════════════════════
  // Summary
  // ══════════════════════════════════
  const summary = document.createElement('h2');
  summary.style.marginTop = '32px';
  summary.textContent = `Results: ${passed} passed, ${failed} failed`;
  summary.style.color = failed === 0 ? '#0f0' : '#f44';
  results.appendChild(summary);
};
</script>
</body>
</html>
