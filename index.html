<style>
  @font-face {
    font-family: 'Fragment Mono';
    src: url('fonts/FragmentMono-Regular.woff2') format('woff2'),
         url('fonts/FragmentMono-Regular.woff') format('woff');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f6f3;
    --white: #ffffff;
    --black: #1a1a1a;
    --dark: #292929;
    --gray: #bababa;
    --accent: #eeff00;
    --accent-border: #c9d700;
    --accent-inset: #abb701;
    --border: #ededed;
    --artboard-border: #e8e4dd;
    --shadow: 0px 3px 6px rgba(0,0,0,.10),
              0px 10px 10px rgba(0,0,0,.09),
              0px 23px 14px rgba(0,0,0,.05),
              0px 41px 16px rgba(0,0,0,.01),
              0px 64px 18px rgba(0,0,0,0);
    --mono: 'Fragment Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: var(--mono);
    overflow-x: hidden;
    color: var(--black);
  }

  img, svg, button, .mode-btn, .nav-btn, .cookie-btn {
    user-select: none;
    -webkit-user-select: none;
    -webkit-user-drag: none;
  }

  /* ── LAYOUT ── */
  #app {
    position: relative;
    width: 100vw; height: 100vh; min-height: 720px;
    display: flex;
    flex-direction: row;
    align-items: stretch;
    justify-content: flex-start;
    padding: 20px;
    gap: 20px;
  }

  /* ── KHOREI LOGO ── */
  #logo {
    position: relative;
    user-select: none;
    -webkit-user-select: none;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: space-between;
    gap: 0;
    width: 100%;
    height: 100%;
    min-width: 90px;
    min-height: 72px;
    text-decoration: none;
    cursor: pointer;
    transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  #logo:hover {
    width: 100%;
    height: 100%;
  }
  #logo-wrap:hover #logo {
    width: 90px;
    height: 72px;
  }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    overflow: hidden;
    flex: 0 0 24px;
  }
  .logo-row img {
    width: 24px;
    height: 24px;
    display: block;
    flex-shrink: 0;
  }
  .logo-row .logo-mid {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 24px;
    overflow: hidden;
    min-width: 0;
    transition: flex 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .logo-row .logo-mid img {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  /* ── ARTBOARD ── */
  #artboard {
    position: relative;
    flex: 1 1 0;
    align-self: stretch;
    min-height: 200px;
    min-width: 0;
    border: 1px solid var(--artboard-border);
    border-radius: 24px;
    overflow: hidden;
    background: #eeedea;
    transition: background 0.2s;
  }
  #artboard:hover:not(.has-file) {
    background: #eeedea;
  }

  /* ── CANVAS AREA inside artboard ── */
  #canvas-wrap {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    transform-style: preserve-3d;
  }
  /* Safari: skip expensive 3D compositing */
  @supports (-webkit-touch-callout: none) {
    #canvas-wrap { transform-style: flat; }
    .fragment-div { transform-style: flat; will-change: auto; }
  }

  #outputSvg {
    position: absolute;
    top: 0; left: 0;
  }
  #previewSvg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: none;
    z-index: 100;
    overflow: visible;
  }

  .fragment-div {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    transform-style: preserve-3d;
    will-change: transform;
  }

  /* ── BOTTOM LEFT BUTTONS ── */
  #bottom-left {
    position: relative;
    z-index: 5;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .nav-btn {
    position: relative;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--accent); border-color: var(--accent-border); }
  .nav-btn:active { transform: scale(0.96); }
  .nav-btn img, .nav-btn svg { width: 24px; height: 24px; }

  .nav-btn .nav-tooltip {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    text-align: center;
  }
  .nav-btn:hover .nav-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── BOTTOM CONTROLS ── */
  #bottom-controls {
    position: relative;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: stretch;
  }

  /* Mode bar (top row) */
  #mode-bar {
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    flex-wrap: nowrap;
    gap: 8px;
    position: relative;
    z-index: 2;
  }

  #mode-buttons {
    display: flex;
    flex: 1;
    flex-direction: column;
    gap: 8px;
    align-items: stretch;
    min-width: 0;
    flex-wrap: nowrap;
  }

  .mode-btn {
    display: flex;
    gap: 4px;
    align-items: center;
    width: 100%;
    min-width: 0;
    cursor: pointer;
    border: none;
    background: transparent;
    padding: 0;
    box-shadow: none;
    border-radius: 0;
  }

  .mode-btn .mode-icon {
    position: relative;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 15px;
    box-shadow: var(--shadow);
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .mode-btn .mode-icon img {
    width: 16px;
    height: 16px;
  }

  .mode-btn .mode-label {
    flex: 1;
    min-width: 116px;
    height: 40px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--dark);
    white-space: nowrap;
    box-shadow: var(--shadow);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    position: relative;
  }

  /* Active state */
  .mode-btn.active .mode-icon {
    background: var(--accent);
    border-color: var(--accent-border);
  }
  .mode-btn.active .mode-label {
    background: var(--accent);
    border-color: var(--accent-border);
    color: #000;
  }
  .mode-btn.active .mode-icon,
  .mode-btn.active .mode-label {
    box-shadow: var(--shadow);
  }

  /* Hover for inactive — accent tint */
  .mode-btn:not(.active):hover .mode-icon,
  .mode-btn:not(.active):hover .mode-label {
    background: var(--accent);
    border-color: var(--accent-border);
  }

  /* Cookie btn (randomize) */
  .cookie-btn {
    position: relative;
    width: 88px;
    height: auto;
    min-height: 88px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 2px;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .cookie-btn:hover { background: var(--accent); border-color: var(--accent-border); }
  .cookie-btn:active { transform: scale(0.96); }
  .cookie-btn img { width: 16px; height: 16px; }

  .cookie-btn .cookie-tooltip {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    text-align: center;
  }
  .cookie-btn:hover .cookie-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── SLIDER PANEL ── */
  #panel {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: clamp(16px, 4vh, 40px) clamp(20px, 4vw, 40px) clamp(24px, 6vh, 64px);
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    gap: clamp(12px, 2vh, 24px);
  }

  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 19px;
  }

  .slider-label {
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 0.02em;
    width: 100%;
  }

  .slider-track-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .slider-track {
    position: relative;
    height: 6px;
    background: #e0ddd8;
    border-radius: 3px;
    cursor: pointer;
    width: 100%;
    box-shadow: inset 0px 1px 2px rgba(0,0,0,0.25);
  }

  .slider-fill {
    position: absolute;
    left: 0; top: 0; height: 100%;
    background: var(--accent);
    border-radius: 3px;
    pointer-events: none;
    box-shadow: inset 0px 1px 2px rgba(0,0,0,0.25);
  }

  .slider-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--dark);
    cursor: grab;
    transition: box-shadow 0.1s, transform 0.1s;
    z-index: 2;
  }
  .slider-thumb:hover {
    box-shadow: 0 0 0 4px rgba(0,0,0,0.08);
    transform: translate(-50%, -50%) scale(1.15);
  }
  .slider-thumb:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.05); }

  #panel-b { display: none; }


  /* ── UPLOAD PROMPT (centered inside artboard) ── */
  #upload-prompt {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 10;
    cursor: pointer;
  }
  #upload-prompt.hidden {
    display: none;
  }
  .upload-prompt-btn {
    width: 40px;
    height: 40px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 2px;
  }
  .upload-prompt-btn img {
    width: 24px;
    height: 24px;
    opacity: 0.35;
  }
  #upload-prompt-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--gray);
    text-align: center;
    white-space: nowrap;
  }

  /* ── COOKIE BTN DISABLED ── */
  .cookie-btn.disabled {
    opacity: 0.35;
    cursor: default;
    pointer-events: none;
  }

  /* ── CURSOR MODES ── */
  #canvas-wrap.cursor-hammer { cursor: url('assets/Hamer.png') 8 24, crosshair; }
  #canvas-wrap.cursor-knife  { cursor: url('assets/Knife.png') 8 24, crosshair; }
  #canvas-wrap.cursor-hammer.hammer-hit { cursor: none; }

  /* ── HAMMER HIT OVERLAY ── */
  .hammer-hit-overlay {
    position: fixed;
    width: 32px;
    height: 32px;
    pointer-events: none;
    z-index: 200;
    transform-origin: 8px 24px;
    transform: rotate(0deg);
    transition: transform 0.1s cubic-bezier(0.2, 0, 0.3, 1);
  }
  .hammer-hit-overlay.down {
    transform: rotate(-30deg);
  }
  .hammer-hit-overlay img {
    width: 100%;
    height: 100%;
  }

  /* ── LOGO WRAP ── */
  #logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1 1 auto;
    min-height: 132px;
  }

  /* ── RIGHT PANEL ── */
  #right-panel {
    width: 35%;
    min-width: 280px;
    max-width: 560px;
    flex-shrink: 0;
    align-self: stretch;
    overflow: visible;
    position: relative;
  }
  #right-panel-inner {
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: absolute;
    top: 0; left: -20px; right: -20px; bottom: -20px;
    padding-left: 20px;
    padding-right: 20px;
    padding-bottom: 20px;
    container-type: inline-size;
    overflow-y: auto;
    overflow-x: visible;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #right-panel-inner::-webkit-scrollbar { display: none; }

  /* ── COPYRIGHT ── */
  #copyright {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray);
    text-align: left;
    line-height: 1.5;
    align-self: center;
  }

  /* file input hidden */
  #fileInput { display: none; }

  /* ── DRAG HINT for mode B ── */
  #drag-hint {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(-50% + 170px));
    font-size: 11px;
    color: var(--gray);
  }

  /* ── VIDEO TOGGLE — matches cookie-btn sizing ── */
  .video-toggle-btn {
    position: relative;
    width: 88px;
    height: auto;
    min-height: 88px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 2px;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .video-toggle-btn:hover,
  .video-toggle-btn.active {
    background: var(--accent);
    border-color: var(--accent-border);
  }
  .video-toggle-btn:active { transform: scale(0.96); }

  /* ── VIDEO PANEL CONTROLS ── */
  #panel { container-type: inline-size; }

  .video-controls-row {
    display: flex;
    gap: 12px;
    width: 100%;
  }
  .video-control-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 11px;
    min-width: 0;
  }

  /* Stack vertically when panel is narrow */
  @container (max-width: 400px) {
    .video-controls-row {
      flex-direction: column;
      gap: 16px;
    }
    /* Compact mode-bar: all buttons in a row, fill space, no labels */
    #mode-bar {
      gap: 8px;
      justify-content: stretch;
    }
    #mode-buttons {
      flex-direction: row;
      gap: 8px;
      flex: 1 1 0;
    }
    .mode-btn {
      flex: 1 1 0;
      width: auto;
    }
    .mode-btn .mode-label {
      display: none;
    }
    .mode-btn .mode-icon {
      width: 48px;
      height: 48px;
    }
    .mode-btn {
      flex: 0 0 auto;
    }
    .video-toggle-btn {
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      min-height: 48px;
    }
    .cookie-btn {
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      min-height: 48px;
    }
  }

  .pill-buttons {
    display: flex;
    gap: 8px;
  }
  .pill-btn {
    flex: 1;
    min-width: 36px;
    height: 24px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dark);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2px 4px;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
  }
  .pill-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    box-shadow: inset 0px 1px 2px rgba(0,0,0,0.25);
    pointer-events: none;
  }
  .pill-btn.active {
    background: var(--accent);
    border-color: var(--accent-border);
  }
  .pill-btn.active::after {
    box-shadow: inset 0px 1px 2px rgba(0,0,0,0.45);
  }
  .pill-btn:hover:not(.active):not(:disabled) {
    background: #f0f0f0;
  }
  .orientation-btn,
  .orientation-spacer {
    flex: 0 0 24px;
    min-width: 24px;
  }
  .orientation-btn {
    padding: 0;
  }
  .orientation-btn img {
    width: 14px;
    height: 14px;
    object-fit: contain;
    transition: transform 0.2s ease;
  }
  .orientation-btn.landscape img {
    transform: rotate(90deg);
  }
  .orientation-btn.disabled,
  .orientation-btn:disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  /* Color inputs */
  .color-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .color-swatch {
    width: 24px;
    height: 24px;
    border-radius: 12px;
    border: 1px solid #c4c4c4;
    flex-shrink: 0;
    position: relative;
    cursor: pointer;
  }
  .color-swatch::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    box-shadow: inset 0px 1px 2px rgba(0,0,0,0.45);
    pointer-events: none;
  }
  .hex-input-wrap {
    flex: 1;
    min-width: 60px;
    height: 24px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .hex-input-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    box-shadow: inset 0px 1px 2px rgba(0,0,0,0.25);
    pointer-events: none;
  }
  .hex-input {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray);
    text-align: center;
    outline: none;
    border-radius: 12px;
    padding: 0 8px;
  }

  .color-presets {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    margin-left: 4px;
  }
  .color-preset-btn {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid #c4c4c4;
    cursor: pointer;
    padding: 0;
    position: relative;
  }
  .color-preset-btn::after {
    display: none;
  }

  /* ── VIDEO ARTBOARD ── */
  #video-artboard {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #e4e2df;
    border: 1px solid #cdcbc9;
    border-radius: 48px;
    overflow: hidden;
    z-index: 5;
    transition: width 0.3s, height 0.3s;
  }
  #record-box {
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
    /* No border-radius — this is the capture area */
  }

  /* ── VIDEO CONTROLS OVERLAY ── */
  #video-controls-overlay {
    position: absolute;
    bottom: 16px;
    left: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 15;
  }
  /* Buttons dim when video mode off */
  .video-overlay-btn {
    transition: opacity 0.2s;
  }
  #video-controls-overlay.video-off .video-overlay-btn {
    opacity: 0.4;
    pointer-events: none;
  }
  /* Timer hidden when video mode off */
  #video-timer {
    transition: opacity 0.2s;
  }
  #video-controls-overlay.video-off #video-timer {
    opacity: 0;
    pointer-events: none;
  }
  #rec-badge {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);

<script>

// ── SLIDER LOGIC ──
function makeSlider(trackEl, thumbEl, fillEl, initial, onChange) {
  let val = initial;
  let dragging = false;

  function update(clientX) {
    const rect = trackEl.getBoundingClientRect();
    let p = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    val = p;
    thumbEl.style.left = (p * 100) + '%';
    fillEl.style.width = (p * 100) + '%';
    onChange(p);
  }

  trackEl.addEventListener('mousedown', e => { dragging = true; update(e.clientX); e.preventDefault(); });
  window.addEventListener('mousemove', e => { if (dragging) update(e.clientX); });
  window.addEventListener('mouseup', () => { dragging = false; });
  trackEl.addEventListener('touchstart', e => { dragging = true; update(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
  window.addEventListener('touchmove', e => { if (dragging) update(e.touches[0].clientX); });
  window.addEventListener('touchend', () => { dragging = false; });

  return { get: () => val };
}

// helpers: map 0..1 to range
const mapVal = (v, min, max) => min + v * (max - min);

// ── BROWSER DETECT ──
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

// ── STATE ──
let originalSvgContent = null;
let parsedSvgDoc = null;
let isRasterSource = false;
let svgW = 400, svgH = 400;
let particles = [];
let rafId = null;
let mode = 'A';
let voronoiPointsA = [];
let allBreakPts = [];
let allBreakMeta = [];
let isDragging = false;
let dragStart = null, dragEnd = null;
let colorImageData = null;

const canvasWrap = document.getElementById('canvas-wrap');
const outputSvg = document.getElementById('outputSvg');
const previewSvg = document.getElementById('previewSvg');

const randomBtn = document.getElementById('randomBtn');

// ── COLOR SAMPLING ──
function prepareColorSampling() {
  return new Promise(resolve => {
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(svgW);
    canvas.height = Math.round(svgH);
    const ctx = canvas.getContext('2d');
    const img = new Image();
    const blob = new Blob([originalSvgContent], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      ctx.drawImage(img, 0, 0, svgW, svgH);
      try {
        colorImageData = ctx.getImageData(0, 0, Math.round(svgW), Math.round(svgH));
      } catch (e) {
        colorImageData = null;
      }
      URL.revokeObjectURL(url);
      resolve();
    };
    img.onerror = () => {
      colorImageData = null;
      URL.revokeObjectURL(url);
      resolve();
    };
    img.src = url;
  });
}

function sampleColor(x, y) {
  if (!colorImageData) return '#555555';
  const w = colorImageData.width;
  const h = colorImageData.height;
  const px = Math.round(Math.max(0, Math.min(w - 1, x)));
  const py = Math.round(Math.max(0, Math.min(h - 1, y)));
  let rSum = 0, gSum = 0, bSum = 0, count = 0;
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const sx = Math.max(0, Math.min(w - 1, px + dx));
      const sy = Math.max(0, Math.min(h - 1, py + dy));
      const idx = (sy * w + sx) * 4;
      const a = colorImageData.data[idx + 3];
      if (a > 20) {
        rSum += colorImageData.data[idx];
        gSum += colorImageData.data[idx + 1];
        bSum += colorImageData.data[idx + 2];
        count++;
      }
    }
  }
  if (count === 0) return '#555555';
  return `rgb(${Math.round(rSum / count)},${Math.round(gSum / count)},${Math.round(bSum / count)})`;
}

function generateJaggedPolygon(numVerts, size) {
  const verts = [];
  for (let i = 0; i < numVerts; i++) {
    const baseAngle = (i / numVerts) * Math.PI * 2;
    const angle = baseAngle + rand(-0.5, 0.5);
    const r = size * rand(0.35, 1.0);
    verts.push([Math.cos(angle) * r, Math.sin(angle) * r]);
  }
  return verts;
}

// ── MODE TOGGLE ──

function setMode(m) {
  mode = m;
  document.getElementById('btnA').classList.toggle('active', m === 'A');
  document.getElementById('btnB').classList.toggle('active', m === 'B');
  document.getElementById('panel-a').style.display = m === 'A' ? 'flex' : 'none';
  document.getElementById('panel-b').style.display = m === 'B' ? 'flex' : 'none';

  // Cursor swap
  canvasWrap.classList.toggle('cursor-hammer', m === 'A');
  canvasWrap.classList.toggle('cursor-knife', m === 'B');

  if (originalSvgContent) resetState();
  savePrefs();
}

// ── PERSIST PREFERENCES ──
function savePrefs() {
  localStorage.setItem('crisp_prefs', JSON.stringify({
    mode, videoMode, videoDuration, videoRatio, videoOrientation
  }));
}

function restorePrefs() {
  try {
    const raw = localStorage.getItem('crisp_prefs');
    if (!raw) return;
    const p = JSON.parse(raw);

    // Mode (Crush / Slice)
    if (p.mode === 'A' || p.mode === 'B') setMode(p.mode);

    // Video mode
    if (p.videoMode === true) videoToggleBtn.click();

    // Duration
    if ([1, 3, 5].includes(p.videoDuration)) {
      const btn = document.querySelector(`[data-duration="${p.videoDuration}"]`);
      if (btn) btn.click();
    }

    // Orientation (restore before ratio so labels are correct)
    if (p.videoOrientation === 'landscape') {
      videoOrientation = 'landscape';
      applyOrientation();
    }

    // Ratio
    const validRatios = ['1:1', '4:5', '9:16', '5:4', '16:9'];
    if (validRatios.includes(p.videoRatio)) {
      const btn = document.querySelector(`[data-ratio="${p.videoRatio}"]`);
      if (btn) btn.click();
    }

    // Colors always reset to defaults (White / Black) on refresh
  } catch (e) { /* ignore corrupt data */ }
}

// ── FILE UPLOAD ──
document.getElementById('uploadBtn').addEventListener('click', () => {

function isRasterFile(file) {
  return /\.(jpg|jpeg|png|webp)$/i.test(file.name) || /^image\/(jpeg|png|webp)/.test(file.type);
}

function rasterToSvg(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const w = img.naturalWidth;
      const h = img.naturalHeight;
      // Convert to data URL so the SVG is self-contained
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const dataUrl = canvas.toDataURL(file.type === 'image/png' ? 'image/png' : 'image/jpeg', 0.95);
      const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><image width="${w}" height="${h}" href="${dataUrl}"/></svg>`;
      URL.revokeObjectURL(url);
      resolve(svgStr);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('Failed to load image'));
    };
    img.src = url;
  });
}

async function loadSvgContent(svgString, raster = false) {
  isRasterSource = raster;
  originalSvgContent = svgString;
  parsedSvgDoc = new DOMParser().parseFromString(originalSvgContent, 'image/svg+xml');
  const svgEl = parsedSvgDoc.querySelector('svg');
  if (!svgEl) return;
  const vb = svgEl.getAttribute('viewBox');
  if (vb) {
    const p = vb.trim().split(/[\s,]+/);
    svgW = parseFloat(p[2]) || 400;
    svgH = parseFloat(p[3]) || 400;
  } else {
    svgW = parseFloat(svgEl.getAttribute('width')) || 400;
    svgH = parseFloat(svgEl.getAttribute('height')) || 400;
  }
  await prepareColorSampling();
  resetState();
  uploadPrompt.classList.add('hidden');
  document.getElementById('artboard').classList.add('has-file');
  randomBtn.classList.remove('disabled');
  panelVideo.classList.remove('no-file');
  applyBgColor();
  applyLogoColor();

  // Disable object color controls for raster images
  const logoRow = document.getElementById('logoColorInput').closest('.video-control-group');
  if (logoRow) {
    logoRow.style.opacity = isRasterSource ? '0.4' : '';
    logoRow.style.pointerEvents = isRasterSource ? 'none' : '';
  }
}

document.getElementById('fileInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    if (isRasterFile(file)) {
      const svgStr = await rasterToSvg(file);
      await loadSvgContent(svgStr, true);
    } else {
      const text = await file.text();
      await loadSvgContent(text, false);
    }
  } catch (err) {
    console.error('File load error:', err);
  }
  e.target.value = '';
});

// ── VORONOI ──
function rand(a, b) { return a + Math.random() * (b - a); }

function convexHull(pts) {
  if (pts.length < 3) return pts;
  pts = pts.slice().sort((a, b) => a[0] - b[0] || a[1] - b[1]);
  const cross = (o, a, b) => (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0]);
  const lo = [], up = [];
  for (const p of pts) { while (lo.length >= 2 && cross(lo[lo.length - 2], lo[lo.length - 1], p) <= 0) lo.pop(); lo.push(p); }
  for (let i = pts.length - 1; i >= 0; i--) { const p = pts[i]; while (up.length >= 2 && cross(up[up.length - 2], up[up.length - 1], p) <= 0) up.pop(); up.push(p); }
  up.pop(); lo.pop(); return lo.concat(up);
}
function hullArea(h) {
  let a = 0;
  for (let i = 0; i < h.length; i++) { const j = (i + 1) % h.length; a += h[i][0] * h[j][1] - h[j][0] * h[i][1]; }
  return Math.abs(a) / 2;
}
function getVoronoiCells(pts, w, h, res = isSafari ? 80 : 130) {
  const cells = pts.map(() => []);
  const sw = w / res, sh = h / res;
  for (let gx = 0; gx <= res; gx++) for (let gy = 0; gy <= res; gy++) {
    const px = gx * sw, py = gy * sh; let minD = Infinity, minI = 0;
    pts.forEach((p, i) => { const d = (px - p[0]) ** 2 + (py - p[1]) ** 2; if (d < minD) { minD = d; minI = i; } });
    cells[minI].push([px, py]);
  }
  return cells;
}

// ── BUILD & RENDER (div+svg fragments) ──
function buildAndRender(vpts) {
  const srcSvg = parsedSvgDoc.querySelector('svg');
  const scale = getScale(); const { offX, offY } = getOff(scale);
  const cW = canvasWrap.clientWidth, cH = canvasWrap.clientHeight;

  outputSvg.style.display = 'none';
  clearFragments();
  particles = [];

  const cells = getVoronoiCells(vpts, svgW, svgH);
  const totalArea = svgW * svgH;
  const ns = 'http://www.w3.org/2000/svg';
  const clipIdBase = Date.now();
  const frag = document.createDocumentFragment();

  vpts.forEach((pt, i) => {
    const hull = convexHull(cells[i]);
    if (hull.length < 3) return;
    const sf = hullArea(hull) / totalArea;
    if (sf < 0.002) return;

    const hcx = hull.reduce((s, p) => s + p[0], 0) / hull.length;
    const hcy = hull.reduce((s, p) => s + p[1], 0) / hull.length;
    const scx = offX + hcx * scale;
    const scy = offY + hcy * scale;
    const isCrumb = sf < 0.03 && mode === 'A';

    const div = document.createElement('div');
    div.className = 'fragment-div';
    div.style.width = cW + 'px';
    div.style.height = cH + 'px';
    div.style.transformOrigin = scx + 'px ' + scy + 'px';

    if (isCrumb) {
      const color = sampleColor(hcx, hcy);
      const crumbSize = rand(2, 7) * scale;
      const numVerts = Math.floor(rand(5, 9));
      const verts = generateJaggedPolygon(numVerts, crumbSize);

      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('width', cW);
      svg.setAttribute('height', cH);
      svg.setAttribute('viewBox', `0 0 ${cW} ${cH}`);
      svg.style.cssText = 'position:absolute;top:0;left:0;overflow:visible;';

      const polygon = document.createElementNS(ns, 'polygon');
      const polyPoints = verts.map(p => (scx + p[0]) + ',' + (scy + p[1])).join(' ');
      polygon.setAttribute('points', polyPoints);
      polygon.setAttribute('fill', color);
      svg.appendChild(polygon);
      div.appendChild(svg);
    } else {
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('width', cW);
      svg.setAttribute('height', cH);
      svg.setAttribute('viewBox', `0 0 ${cW} ${cH}`);
      svg.style.cssText = 'position:absolute;top:0;left:0;';

      const defs = document.createElementNS(ns, 'defs');
      const clipId = `clip_${clipIdBase}_${i}`;
      const clip = document.createElementNS(ns, 'clipPath');
      clip.setAttribute('id', clipId);
      const poly = document.createElementNS(ns, 'polygon');
      poly.setAttribute('points', hull.map(p => p.join(',')).join(' '));
      clip.appendChild(poly);
      defs.appendChild(clip);
      svg.appendChild(defs);

      const outerG = document.createElementNS(ns, 'g');
      outerG.setAttribute('transform', `translate(${offX},${offY}) scale(${scale})`);
      const cellG = document.createElementNS(ns, 'g');
      cellG.setAttribute('clip-path', `url(#${clipId})`);
      Array.from(srcSvg.childNodes).forEach(child => {
        cellG.appendChild(document.importNode(child, true));
      });
      outerG.appendChild(cellG);
      svg.appendChild(outerG);
      div.appendChild(svg);
    }

    frag.appendChild(div);

    particles.push({
      el: div, cx: hcx, cy: hcy,
      screenCx: scx, screenCy: scy,
      px: scx, py: scy,
      rot: 0, rx: 0, ry: 0,
      targetRx: 0, targetRy: 0,
      vx: 0, vy: 0, vr: 0,
      scale, offX, offY, sf,
      isCrumb
    });
  });

  canvasWrap.appendChild(frag);
  applyTransforms();
  // Re-apply custom logo color after rebuild from original SVG
  applyLogoColor();
}

function applyTransforms() {
  particles.forEach(p => {
    const tx = p.px - p.screenCx;
    const ty = p.py - p.screenCy;
    if (isSafari) {
      p.el.style.transform = `translate(${tx}px, ${ty}px) rotate(${p.rot}deg)`;
    } else {
      p.el.style.transform = `perspective(600px) translate(${tx}px, ${ty}px) rotateX(${p.rx}deg) rotateY(${p.ry}deg) rotateZ(${p.rot}deg)`;
    }
  });
}

// ── MODE A ──
function triggerModeA(clickX, clickY) {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  const power = mapVal(sliderPowerA.get(), 0.001, 20);
  const crisp = mapVal(sliderCrisp.get(), 1, 10);

  const bigCount = 2 + Math.floor(crisp * 0.3);
  for (let i = 0; i < bigCount; i++) {
    const r = rand(svgW * 0.06, svgW * 0.3), a = rand(0, Math.PI * 2);
    voronoiPointsA.push([Math.max(1, Math.min(svgW - 1, clickX + Math.cos(a) * r)), Math.max(1, Math.min(svgH - 1, clickY + Math.sin(a) * r))]);
  }
  for (let i = 0; i < 6 + crisp * 3; i++) {
    const r = rand(1, svgW * 0.08), a = rand(0, Math.PI * 2);
    voronoiPointsA.push([Math.max(1, Math.min(svgW - 1, clickX + Math.cos(a) * r)), Math.max(1, Math.min(svgH - 1, clickY + Math.sin(a) * r))]);
  }

  buildAndRender(voronoiPointsA);
  const scale = getScale(); const { offX, offY } = getOff(scale);
  const fromSX = offX + clickX * scale, fromSY = offY + clickY * scale;
  const maxSpeed = 0.002 + (power / 20) * 2.5;
  const maxAngle = mapVal(sliderPowerA.get(), 0.5, 38);

  particles.forEach(p => {
    const dx = p.screenCx - fromSX, dy = p.screenCy - fromSY, dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const isSmall = p.sf < 0.03;
    const speed = isSmall ? maxSpeed * rand(0.8, 2.0) : maxSpeed * rand(0.3, 0.8);
    p.vx = (dx / dist) * speed + rand(-1, 1) * speed * 0.3;
    p.vy = (dy / dist) * speed + rand(-1, 1) * speed * 0.3;
    p.vr = rand(-1, 1) * (isSmall ? 0.8 : 0.2);

    const angle = Math.atan2(dy, dx);
    const rotAmount = isSmall ? maxAngle * rand(0.6, 1.0) : maxAngle * rand(0.3, 0.8);
    p.targetRy = Math.cos(angle) * rotAmount;
    p.targetRx = -Math.sin(angle) * rotAmount * 0.7;
  });
  animate();
}

// ── MODE B ──
function buildBreakPts(sA, sB, jagged) {
  const scale = getScale(); const { offX, offY } = getOff(scale);
  const ax = (sA.x - offX) / scale, ay = (sA.y - offY) / scale;
  const bx = (sB.x - offX) / scale, by = (sB.y - offY) / scale;
  const dx = bx - ax, dy = by - ay, len = Math.sqrt(dx * dx + dy * dy) || 1;
  const ext = Math.sqrt(svgW * svgW + svgH * svgH) * 0.85;
  const ox = ax - (dx / len) * ext, oy = ay - (dy / len) * ext;
  const ex = ax + (dx / len) * ext, ey = ay + (dy / len) * ext;
  const angle = Math.atan2(dy, dx);
  const perp = angle + Math.PI / 2;
  const cx = (ax + bx) / 2, cy = (ay + by) / 2;
  const totalLen = Math.sqrt((ex - ox) ** 2 + (ey - oy) ** 2);

  if (jagged <= 1.1) {
    const gap = svgW * 0.006;
    return {
      pts: [
        [cx + Math.cos(perp) * gap, cy + Math.sin(perp) * gap],
        [cx - Math.cos(perp) * gap, cy - Math.sin(perp) * gap]
      ],
      perp, cx, cy, ax, ay, bx, by
    };
  }

  const t = (jagged - 1) / 9;
  const teeth = Math.round(2 + t * 20);
  const amplitude = svgW * (0.008 + t * 0.082);
  const gap = svgW * (0.005 + t * 0.012);
  const ph1A = rand(0, Math.PI * 2), ph2A = rand(0, Math.PI * 2), ph3A = rand(0, Math.PI * 2);
  const ph1B = rand(0, Math.PI * 2), ph2B = rand(0, Math.PI * 2), ph3B = rand(0, Math.PI * 2);
  const f1 = teeth * 2.2 / totalLen, f2 = f1 * 1.8, f3 = f1 * 3.5;

  const pts = [];
  for (let i = 0; i <= teeth; i++) {
    const tt = i / teeth;
    const lx = ox + (ex - ox) * tt, ly = oy + (ey - oy) * tt;
    const d = tt * totalLen;
    const profA = amplitude * (0.55 * Math.sin(d * f1 + ph1A) + 0.3 * Math.sin(d * f2 + ph2A) + 0.15 * Math.sin(d * f3 + ph3A));
    const profB = amplitude * (0.55 * Math.sin(d * f1 + ph1B) + 0.3 * Math.sin(d * f2 + ph2B) + 0.15 * Math.sin(d * f3 + ph3B));
    pts.push([lx + Math.cos(perp) * (gap + profA), ly + Math.sin(perp) * (gap + profA)]);
    pts.push([lx - Math.cos(perp) * (gap + profB), ly - Math.sin(perp) * (gap + profB)]);
  }
  return { pts, perp, cx, cy, ax, ay, bx, by };
}

function triggerModeB(sA, sB) {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  const power = mapVal(sliderPowerB.get(), 0.025, 0.6);
  const jagged = mapVal(sliderJagged.get(), 1, 10);

  const { pts, perp, cx, cy, ax, ay, bx, by } = buildBreakPts(sA, sB, jagged);
  allBreakPts.push(...pts);
  allBreakMeta.push({ perp, cx, cy });

  buildAndRender(allBreakPts);

  const breakDx = bx - ax, breakDy = by - ay;
  const breakLen = Math.sqrt(breakDx * breakDx + breakDy * breakDy) || 1;

  let maxDist = 0;
  particles.forEach(p => {
    const d = Math.abs((p.cx - ax) * breakDy - (p.cy - ay) * breakDx) / breakLen;
    if (d > maxDist) maxDist = d;
  });

  const maxAngle = 35;
  const perpX = Math.cos(perp), perpY = Math.sin(perp);

  particles.forEach(p => {
    const dx = p.cx - cx, dy = p.cy - cy;
    const sign = (dx * perpX + dy * perpY) >= 0 ? 1 : -1;

    p.vx = perpX * sign * power * rand(0.85, 1.15);
    p.vy = perpY * sign * power * rand(0.85, 1.15);
    p.vr = rand(-1, 1) * 0.006 * (jagged / 10);

    const dist = Math.abs((p.cx - ax) * breakDy - (p.cy - ay) * breakDx) / breakLen;
    const normalizedDist = maxDist > 0 ? dist / maxDist : 0;
    const droopAmount = normalizedDist * normalizedDist * maxAngle * rand(0.8, 1.0);
    p.targetRx = droopAmount;
    p.targetRy = sign * normalizedDist * 8 * rand(0.5, 1.0);
  });
  animate();
}

// ── ANIMATION ──
function animate() {
  const cW = canvasWrap.clientWidth, cH = canvasWrap.clientHeight;
  let anyMoving = false;
  particles.forEach(p => {
    const isSmall = p.sf < 0.03;
    const friction = isSmall ? 0.88 : 0.94;
    p.vx *= friction; p.vy *= friction; p.vr *= 0.92;
    p.px += p.vx; p.py += p.vy; p.rot += p.vr;

    p.rx += (p.targetRx - p.rx) * 0.07;
    p.ry += (p.targetRy - p.ry) * 0.07;

    if (p.px < 0) { p.px = 0; p.vx = Math.abs(p.vx) * 0.2; }
    if (p.px > cW) { p.px = cW; p.vx = -Math.abs(p.vx) * 0.2; }
    if (p.py < 0) { p.py = 0; p.vy = Math.abs(p.vy) * 0.2; }
    if (p.py > cH) { p.py = cH; p.vy = -Math.abs(p.vy) * 0.1; }

    if (Math.sqrt(p.vx ** 2 + p.vy ** 2) > 0.005 || Math.abs(p.vr) > 0.003 ||
        Math.abs(p.targetRx - p.rx) > 0.15 || Math.abs(p.targetRy - p.ry) > 0.15) {
      anyMoving = true;
    }
  });
  applyTransforms();
  if (anyMoving) rafId = requestAnimationFrame(animate);
  else rafId = null;
}

function applyOrientation() {
  const ratioMap = { '4:5': '5:4', '5:4': '4:5', '9:16': '16:9', '16:9': '9:16' };
  const btns = document.querySelectorAll('[data-ratio]');
  btns.forEach(btn => {
    const r = btn.dataset.ratio;
    if (r === '1:1') return;
    if (videoOrientation === 'landscape') {
      const landscape = ratioMap[r] && r.indexOf(':') > 0 && parseInt(r) < parseInt(r.split(':')[1]) ? ratioMap[r] : r;
      // If portrait ratio, swap to landscape
      if (r === '4:5') { btn.dataset.ratio = '5:4'; btn.textContent = '5:4'; }
      else if (r === '9:16') { btn.dataset.ratio = '16:9'; btn.textContent = '16:9'; }
    } else {
      // If landscape ratio, swap to portrait
      if (r === '5:4') { btn.dataset.ratio = '4:5'; btn.textContent = '4:5'; }
      else if (r === '16:9') { btn.dataset.ratio = '9:16'; btn.textContent = '9:16'; }
    }
  });
  // Update active ratio if it was swapped
  const activeBtn = document.querySelector('[data-ratio].active');
  if (activeBtn) videoRatio = activeBtn.dataset.ratio;
  orientationBtn.classList.toggle('landscape', videoOrientation === 'landscape');
}

// Update video artboard size based on ratio
function updateVideoArtboardSize() {
  if (!videoMode) return;
  const artboardRect = artboard.getBoundingClientRect();
  const maxH = artboardRect.height * 0.7;
  const maxW = artboardRect.width - 80;

  let ratioW, ratioH;
  const parts = videoRatio.split(':');
  ratioW = parseInt(parts[0]) || 1;
  ratioH = parseInt(parts[1]) || 1;

  let w, h;
  if (maxW / ratioW < maxH / ratioH) {
    w = maxW;
    h = maxW * (ratioH / ratioW);
  } else {
    h = maxH;
    w = maxH * (ratioW / ratioH);
  }

  videoArtboard.style.width = w + 'px';
  videoArtboard.style.height = h + 'px';

  // Re-render SVG to fit new record-box size (wait for CSS transition 300ms)
  if (originalSvgContent) {
    const reRender = () => {
      if (voronoiPointsA.length > 0 && mode === 'A') {
        buildAndRender(voronoiPointsA);
      } else if (allBreakPts.length > 0 && mode === 'B') {
        buildAndRender(allBreakPts);
      } else {
        renderOriginal();
      }
    };
    // Render immediately for snappy feel, then again after transition ends
    setTimeout(reRender, 20);
    setTimeout(reRender, 350);
  }
}

// Color keyword resolver
function resolveColorKeyword(val) {
  const lower = val.toLowerCase().trim();
  const keywords = {
    'transparent': 'transparent',
    'white': '#ffffff',
    'black': '#000000',
    'red': '#e31c1c',
    'green': '#eaf73c',
    'gray': '#d7d7d7',
    'grey': '#d7d7d7',
  };
  if (keywords[lower]) return keywords[lower];
  // Accept hex with or without #, 3 or 6 digits
  const hex = lower.replace(/^#/, '');
  if (/^[0-9a-f]{6}$/.test(hex)) return '#' + hex;
  if (/^[0-9a-f]{3}$/.test(hex)) return '#' + hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return null;
}

const checkerBg = "url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22><rect width=%2212%22 height=%2212%22 fill=%22%23ccc%22/><rect x=%2212%22 y=%2212%22 width=%2212%22 height=%2212%22 fill=%22%23ccc%22/></svg>')";

}

// Warm up MP4 encoder on page load to prevent corrupted first recording
(function warmupMp4() {
  if (!window.MediaRecorder) return;
  const mp4 = 'video/mp4';
  if (!MediaRecorder.isTypeSupported(mp4)) return;
  const c = document.createElement('canvas');
  c.width = 2; c.height = 2;
  const ctx = c.getContext('2d');
  ctx.fillRect(0, 0, 2, 2);
  try {
    const s = c.captureStream(0);
    const r = new MediaRecorder(s, { mimeType: mp4 });
    r.ondataavailable = () => {};
    r.start();
    setTimeout(() => { try { r.stop(); } catch(e) {} }, 100);
  } catch(e) {}
})();

// ── VIDEO RECORDING ENGINE ──
let isRecording = false;
let recordingComplete = false;
let recordingStartTime = 0;
let exportCanvas = null;
let exportCtx = null;
let mediaRecorder = null;
let recordedChunks = [];
let recordedVideoBlob = null;
let recordedVideoUrl = null;
let frameRendering = false;
let exportCanvas2 = null;
let exportCtx2 = null;
let mediaRecorder2 = null;
let recordedChunks2 = [];
let recordedVideoBlob2 = null;
let exportContrastBg = '#ffffff';
let exportAlphaMode = false;
let blobsReady = null;

function isLogoBright(hex) {
  if (!hex || hex === 'transparent') return false;
  const c = hex.replace('#', '');
  const r = parseInt(c.substring(0, 2), 16) || 0;
  const g = parseInt(c.substring(2, 4), 16) || 0;
  const b = parseInt(c.substring(4, 6), 16) || 0;
  return (0.2126 * r + 0.7152 * g + 0.0722 * b) > 128;
}

function getExportDimensions() {
  switch (videoRatio) {
    case '4:5': return { w: 1080, h: 1350 };
    case '5:4': return { w: 1350, h: 1080 };
    case '9:16': return { w: 1080, h: 1920 };
    case '16:9': return { w: 1920, h: 1080 };
    default: return { w: 1080, h: 1080 };
  }
}

function getExportFilename(ext) {
  const ratio = videoRatio.replace(':', '-');
  const svgEl = parsedSvgDoc ? parsedSvgDoc.querySelector('svg') : null;
  let name = 'output';
  if (originalSvgContent) {
    const match = originalSvgContent.match(/<title[^>]*>([^<]+)<\/title>/i);
    if (match) name = match[1].trim().replace(/[^a-zA-Z0-9_-]/g, '_');
  }
  return `crisp_${ratio}-${name}.${ext}`;
}

function serializeCurrentFrame(exportW, exportH) {
  const ns = 'http://www.w3.org/2000/svg';
  const cW = canvasWrap.clientWidth, cH = canvasWrap.clientHeight;

  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('xmlns', ns);
  svg.setAttribute('width', exportW);
  svg.setAttribute('height', exportH);
  svg.setAttribute('viewBox', `0 0 ${cW} ${cH}`);

  if (particles.length === 0) {
    Array.from(outputSvg.childNodes).forEach(child => {
      svg.appendChild(document.importNode(child, true));
    });
  } else {
    particles.forEach(p => {
      const innerSvg = p.el.querySelector('svg');
      if (!innerSvg) return;
      const g = document.createElementNS(ns, 'g');
      const tx = p.px - p.screenCx;
      const ty = p.py - p.screenCy;
      g.setAttribute('transform', `translate(${tx},${ty}) rotate(${p.rot},${p.screenCx},${p.screenCy})`);
      Array.from(innerSvg.childNodes).forEach(child => {
        g.appendChild(document.importNode(child, true));
      });
      svg.appendChild(g);
    });
  }

  return new XMLSerializer().serializeToString(svg);
}

function renderExportFrame(callback) {
  if (!exportCanvas) { if (callback) callback(); return; }

  const { w, h } = getExportDimensions();
  const svgStr = serializeCurrentFrame(w, h);
  const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);

  const img = new Image();
  img.onload = () => {
    // Main canvas
    if (exportAlphaMode) {
      exportCtx.clearRect(0, 0, w, h);
    } else if (videoBgColor === 'transparent') {
      exportCtx.fillStyle = exportContrastBg;
      exportCtx.fillRect(0, 0, w, h);
    } else {
      exportCtx.fillStyle = videoBgColor;
      exportCtx.fillRect(0, 0, w, h);
    }
    exportCtx.drawImage(img, 0, 0, w, h);

    // Contrast bg canvas for transparent mode (MP4)
    if (exportCtx2) {
      exportCtx2.fillStyle = exportContrastBg;
      exportCtx2.fillRect(0, 0, w, h);
      exportCtx2.drawImage(img, 0, 0, w, h);
    }

    if (callback) callback();
  };
  img.onerror = () => {
    if (callback) callback();
  };
  img.src = url;
}

function startRecording() {
  if (isRecording || !originalSvgContent || !videoMode) return;
  if (typeof MediaRecorder === 'undefined') {
    alert('Video recording is not supported in this browser.');
    return;
  }

  const { w, h } = getExportDimensions();
  const isTransparent = videoBgColor === 'transparent';

  recordedChunks = [];

  // Detect best codecs
  const webmVP9 = 'video/webm;codecs=vp9';
  const webmVP8 = 'video/webm;codecs=vp8';
  const webm = 'video/webm';
  const mp4 = 'video/mp4';

  const bestWebm = MediaRecorder.isTypeSupported(webmVP9) ? webmVP9 :
                   MediaRecorder.isTypeSupported(webmVP8) ? webmVP8 :
                   MediaRecorder.isTypeSupported(webm) ? webm : '';
  const bestMp4 = MediaRecorder.isTypeSupported(mp4) ? mp4 : '';

  if (isTransparent && bestWebm && !isSafari) {
    // WebM with alpha on main canvas (Chrome/Firefox)
    exportCanvas = document.createElement('canvas');
    exportCanvas.width = w;
    exportCanvas.height = h;
    exportCtx = exportCanvas.getContext('2d'); // alpha enabled
    exportAlphaMode = true;
    const stream = exportCanvas.captureStream(30);
    const opts = { videoBitsPerSecond: 8000000, mimeType: bestWebm };
    mediaRecorder = new MediaRecorder(stream, opts);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };

    // Contrast bg canvas for MP4 (no alpha)
    exportCanvas2 = document.createElement('canvas');
    exportCanvas2.width = w;
    exportCanvas2.height = h;
    exportCtx2 = exportCanvas2.getContext('2d', { alpha: false });
    exportContrastBg = isLogoBright(videoLogoColor) ? '#000000' : '#ffffff';
    exportCtx2.fillStyle = exportContrastBg;
    exportCtx2.fillRect(0, 0, w, h);
    recordedChunks2 = [];

    const stream2 = exportCanvas2.captureStream(30);
    const opts2 = { videoBitsPerSecond: 8000000 };
    if (bestMp4) opts2.mimeType = bestMp4;
    else opts2.mimeType = bestWebm;
    mediaRecorder2 = new MediaRecorder(stream2, opts2);
    mediaRecorder2.ondataavailable = e => { if (e.data.size > 0) recordedChunks2.push(e.data); };
  } else {
    // Single recording — solid bg or Safari transparent fallback
    const effectiveBg = isTransparent
      ? (isLogoBright(videoLogoColor) ? '#000000' : '#ffffff')
      : videoBgColor;
    if (isTransparent) exportContrastBg = effectiveBg;

    exportCanvas = document.createElement('canvas');
    exportCanvas.width = w;
    exportCanvas.height = h;
    exportCtx = exportCanvas.getContext('2d', { alpha: false });
    exportCtx.fillStyle = effectiveBg;
    exportCtx.fillRect(0, 0, w, h);
    const stream = exportCanvas.captureStream(30);
    const opts = { videoBitsPerSecond: 8000000 };
    if (bestMp4) opts.mimeType = bestMp4;
    else if (bestWebm) opts.mimeType = bestWebm;
    mediaRecorder = new MediaRecorder(stream, opts);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };

    exportCanvas2 = null;
    exportCtx2 = null;
    mediaRecorder2 = null;
  }

  // Start
  isRecording = true;
  recordingStartTime = performance.now();
  frameRendering = false;

  // UI: rec dot on, block controls
  document.querySelector('.rec-dot').style.opacity = '1';
  document.getElementById('btnA').style.pointerEvents = 'none';
  document.getElementById('btnB').style.pointerEvents = 'none';
  videoToggleBtn.style.pointerEvents = 'none';
  document.querySelectorAll('[data-duration]').forEach(b => b.style.pointerEvents = 'none');
  document.querySelectorAll('[data-ratio]').forEach(b => b.style.pointerEvents = 'none');
  // Block bottom-left buttons during recording
  document.getElementById('bottom-left').style.opacity = '0.4';
  document.getElementById('bottom-left').style.pointerEvents = 'none';

  // WebM handles chunked recording fine; MP4 needs single chunk (no timeslice)
  const isMp4Main = mediaRecorder.mimeType.includes('mp4');
  mediaRecorder.start(isMp4Main ? undefined : 100);
  if (mediaRecorder2) {
    const isMp4Second = mediaRecorder2.mimeType.includes('mp4');
    mediaRecorder2.start(isMp4Second ? undefined : 100);
  }

  recordFrameLoop();
}

function recordFrameLoop() {
  if (!isRecording) return;

  const elapsed = (performance.now() - recordingStartTime) / 1000;
  document.getElementById('timer-current').textContent = elapsed.toFixed(2) + ' s';

  if (elapsed >= videoDuration) {
    stopRecording();
    return;
  }

  if (!frameRendering) {
    frameRendering = true;
    renderExportFrame(() => { frameRendering = false; });
  }
  requestAnimationFrame(recordFrameLoop);
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  recordingComplete = true;

  document.getElementById('timer-current').textContent = videoDuration.toFixed(2) + ' s';

  // Dim the panel
  document.getElementById('panel').style.opacity = '0.4';
  document.getElementById('panel').style.pointerEvents = 'none';
  // Re-enable video toggle button
  videoToggleBtn.style.pointerEvents = '';
  // Gray out mode-bar children except video toggle
  document.getElementById('mode-bar').querySelectorAll(':scope > *').forEach(el => {
    if (el !== videoToggleBtn) {
      el.style.opacity = '0.4';
      el.style.pointerEvents = 'none';
    }
  });

  // Restore bottom-left buttons after recording stops
  document.getElementById('bottom-left').style.opacity = '';
  document.getElementById('bottom-left').style.pointerEvents = '';
  // Switch cursor to replay
  canvasWrap.classList.remove('cursor-hammer', 'cursor-knife');
  canvasWrap.classList.add('cursor-replay');
  document.getElementById('artboard').classList.add('cursor-replay');

  // Create promise immediately so download can await it
  let blobsResolve;
  blobsReady = new Promise(resolve => { blobsResolve = resolve; });

  // Render final frame, then wait briefly for encoder to flush, then stop recorders
  renderExportFrame(() => {
    setTimeout(() => {
      const stops = [];
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        stops.push(new Promise(resolve => {
          mediaRecorder.onstop = resolve;
          mediaRecorder.stop();
        }));
      }
      if (mediaRecorder2 && mediaRecorder2.state !== 'inactive') {
        stops.push(new Promise(resolve => {
          mediaRecorder2.onstop = resolve;
          mediaRecorder2.stop();
        }));
      }

      Promise.all(stops).then(() => {
        if (recordedChunks.length > 0) {
          recordedVideoBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
          recordedVideoUrl = URL.createObjectURL(recordedVideoBlob);
        }
        if (recordedChunks2.length > 0) {
          recordedVideoBlob2 = new Blob(recordedChunks2, { type: mediaRecorder2.mimeType });
        }
        blobsResolve();
      });
    }, 200);
  });
}

function cleanupRecording() {
  recordingComplete = false;
  if (recordedVideoUrl) {
    URL.revokeObjectURL(recordedVideoUrl);
    recordedVideoUrl = null;
  }
  recordedVideoBlob = null;
  recordedVideoBlob2 = null;
  recordedChunks = [];
  recordedChunks2 = [];
  exportCanvas = null;
  exportCtx = null;
  exportCanvas2 = null;
  exportCtx2 = null;
  exportAlphaMode = false;
  blobsReady = null;
  mediaRecorder = null;
  mediaRecorder2 = null;
  // Reset rec dot
  document.querySelector('.rec-dot').style.opacity = '0.4';
  // Re-enable panel, mode bar and bottom-left
  document.getElementById('panel').style.opacity = '';
  document.getElementById('panel').style.pointerEvents = '';
  document.getElementById('bottom-left').style.opacity = '';
  document.getElementById('bottom-left').style.pointerEvents = '';
  document.getElementById('mode-bar').querySelectorAll(':scope > *').forEach(el => {
    el.style.opacity = '';
    el.style.pointerEvents = '';
  });
  document.getElementById('btnA').style.pointerEvents = '';
  document.getElementById('btnB').style.pointerEvents = '';
  videoToggleBtn.style.pointerEvents = '';
  document.querySelectorAll('[data-duration]').forEach(b => b.style.pointerEvents = '');
  document.querySelectorAll('[data-ratio]').forEach(b => b.style.pointerEvents = '');
  // Restore cursor
  canvasWrap.classList.remove('cursor-replay');
  document.getElementById('artboard').classList.remove('cursor-replay');
  canvasWrap.classList.toggle('cursor-hammer', mode === 'A');
  canvasWrap.classList.toggle('cursor-knife', mode === 'B');
  // Reset timer
  document.getElementById('timer-current').textContent = '0.00 s';
  // Remove replay elements
  const existingVideo = recordBox.querySelector('.replay-video');
  const existingCanvas = recordBox.querySelector('.replay-canvas');
  if (existingVideo) existingVideo.remove();
  if (existingCanvas) existingCanvas.remove();
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function downloadRecordedVideo() {
  if (blobsReady) await blobsReady;

  const isTransparent = videoBgColor === 'transparent';

  if (isTransparent && recordedVideoBlob2) {
    // ZIP: WebM (alpha) + MP4/WebM (contrast bg)
    if (typeof JSZip !== 'undefined') {
      const zip = new JSZip();
      const ext1 = mediaRecorder && mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
      const ext2 = mediaRecorder2 && mediaRecorder2.mimeType.includes('mp4') ? 'mp4' : 'webm';
      zip.file(getExportFilename(ext1 === 'mp4' ? 'webm' : ext1).replace('.webm', '_alpha.webm'), recordedVideoBlob);
      zip.file(getExportFilename(ext2).replace('.' + ext2, '_bg.' + ext2), recordedVideoBlob2);

      const zipBlob = await zip.generateAsync({ type: 'blob' });
      downloadBlob(zipBlob, getExportFilename('zip'));
    } else {
      downloadBlob(recordedVideoBlob, getExportFilename('webm'));
    }
  } else if (recordedVideoBlob) {
    const ext = mediaRecorder && mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
    downloadBlob(recordedVideoBlob, getExportFilename(ext));
  }
}

// ── REPLAY ──
document.getElementById('replayBtn').addEventListener('click', () => {
  if (!recordedVideoUrl || isRecording) return;

  // Remove existing replay
  const existingCanvas = recordBox.querySelector('.replay-canvas');
  const existingVideo = recordBox.querySelector('.replay-video');
  if (existingCanvas || existingVideo) {
    if (existingCanvas) existingCanvas.remove();
    if (existingVideo) existingVideo.remove();
    return;
  }

  const isTransparent = videoBgColor === 'transparent';
  const timerCurrent = document.getElementById('timer-current');
  let replayRAF;

  // Hidden video element for decoding
  const video = document.createElement('video');
  video.className = 'replay-video';
  video.style.cssText = 'position:absolute;top:0;left:0;width:0;height:0;opacity:0;pointer-events:none;';
  video.src = recordedVideoUrl;
  video.muted = true;
  video.playsInline = true;

  if (isTransparent && exportAlphaMode) {
    // WebM alpha available (Chrome/Firefox) — canvas with checkerboard
    const { w, h } = getExportDimensions();
    const replayCanvas = document.createElement('canvas');
    replayCanvas.className = 'replay-canvas';
    replayCanvas.width = w;
    replayCanvas.height = h;
    replayCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;z-index:50;border-radius:inherit;';
    const rCtx = replayCanvas.getContext('2d');

    const checkerSize = 24;
    const checkerCanvas = document.createElement('canvas');
    checkerCanvas.width = checkerSize * 2;
    checkerCanvas.height = checkerSize * 2;
    const cCtx = checkerCanvas.getContext('2d');
    cCtx.fillStyle = '#ffffff';
    cCtx.fillRect(0, 0, checkerSize * 2, checkerSize * 2);
    cCtx.fillStyle = '#cccccc';
    cCtx.fillRect(0, 0, checkerSize, checkerSize);
    cCtx.fillRect(checkerSize, checkerSize, checkerSize, checkerSize);
    const checkerPattern = rCtx.createPattern(checkerCanvas, 'repeat');

    recordBox.appendChild(video);
    recordBox.appendChild(replayCanvas);

    function drawFrame() {
      if (!replayCanvas.parentNode) return;
      rCtx.fillStyle = checkerPattern;
      rCtx.fillRect(0, 0, w, h);
      rCtx.drawImage(video, 0, 0, w, h);
      timerCurrent.textContent = video.currentTime.toFixed(2) + ' s';
      replayRAF = requestAnimationFrame(drawFrame);
    }

    video.addEventListener('play', () => { replayRAF = requestAnimationFrame(drawFrame); });
    video.addEventListener('ended', () => {
      cancelAnimationFrame(replayRAF);
      timerCurrent.textContent = videoDuration.toFixed(2) + ' s';
      replayCanvas.remove();
      video.remove();
    });

    video.play();
  } else {
    // Solid bg or Safari transparent fallback
    video.className = 'replay-video';
    const replayBgColor = (videoBgColor === 'transparent') ? exportContrastBg : videoBgColor;
    video.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;z-index:50;border-radius:inherit;background:' + replayBgColor + ';';
    recordBox.appendChild(video);
    video.play();

    function updateTimer() {
      if (!video.parentNode) return;
      timerCurrent.textContent = video.currentTime.toFixed(2) + ' s';
      replayRAF = requestAnimationFrame(updateTimer);
    }
    replayRAF = requestAnimationFrame(updateTimer);

    video.addEventListener('ended', () => {
      cancelAnimationFrame(replayRAF);
      timerCurrent.textContent = videoDuration.toFixed(2) + ' s';
      video.remove();
    });
  }
});

// ── RESTORE SAVED PREFERENCES ──
restorePrefs();
</script>
