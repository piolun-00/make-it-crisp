<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make it Crisp! — Khorei Lab</title>
<meta name="description" content="Crush, slice & break your SVGs into pieces. A destructive design tool by Khorei Lab.">
<link rel="icon" type="image/png" href="assets/meta/favicon.png">
<link rel="apple-touch-icon" href="assets/meta/apple-touch-icon.png">
<meta property="og:title" content="Make it Crisp! — A destructive SVG tool">
<meta property="og:description" content="Crush, slice & break your SVGs into pieces. A destructive design tool by Khorei.">
<meta property="og:image" content="https://piolun-00.github.io/make-it-crisp/assets/meta/og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Make it Crisp! — A destructive SVG tool">
<meta name="twitter:description" content="Crush, slice & break your SVGs into pieces. A destructive design tool by Khorei.">
<meta name="twitter:image" content="https://piolun-00.github.io/make-it-crisp/assets/meta/og-image.png">
<style>
  @font-face {
    font-family: 'Fragment Mono';
    src: url('fonts/FragmentMono-Regular.woff2') format('woff2'),
         url('fonts/FragmentMono-Regular.woff') format('woff');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f6f3;
    --white: #ffffff;
    --black: #1a1a1a;
    --dark: #292929;
    --gray: #bababa;
    --accent: #eeff00;
    --accent-border: #c9d700;
    --accent-inset: #abb701;
    --border: #ededed;
    --artboard-border: #e8e4dd;
    --shadow: 0px 3px 6px rgba(0,0,0,.10),
              0px 10px 10px rgba(0,0,0,.09),
              0px 23px 14px rgba(0,0,0,.05),
              0px 41px 16px rgba(0,0,0,.01),
              0px 64px 18px rgba(0,0,0,0);
    --mono: 'Fragment Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: var(--mono);
    overflow-x: hidden;
    color: var(--black);
  }

  img, svg, button, .mode-btn, .nav-btn, .cookie-btn {
    user-select: none;
    -webkit-user-select: none;
    -webkit-user-drag: none;
  }

  /* ── LAYOUT ── */
  #app {
    position: relative;
    width: 100vw; height: 100vh; min-height: 720px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── KHOREI LOGO ── */
  #logo {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    user-select: none;
    -webkit-user-select: none;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: space-between;
    gap: 0;
    width: 144px;
    height: 72px;
    min-width: 90px;
    min-height: 72px;
    text-decoration: none;
    cursor: pointer;
    transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  /* Desktop: compact → hover expands in X and Y */
  #logo:hover {
    width: 320px;
    height: 140px;
  }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    overflow: hidden;
    flex: 0 0 24px;
  }
  .logo-row img {
    width: 24px;
    height: 24px;
    display: block;
    flex-shrink: 0;
  }
  .logo-row .logo-mid {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 24px;
    overflow: hidden;
    min-width: 0;
    transition: flex 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .logo-row .logo-mid img {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  /* ── ARTBOARD ── */
  #artboard {
    position: absolute;
    top: 112px;
    left: 50%;
    transform: translateX(-50%);
    width: min(1280px, calc(100% - 40px), calc((100vh - 40px) * 4 / 3));
    bottom: 20px;
    min-height: 200px;
    border: 1px solid var(--artboard-border);
    border-radius: 24px;
    overflow: hidden;
    background: transparent;
    transition: background 0.2s;
  }
  #artboard:hover:not(.has-file) {
    background: #eeedea;
  }

  /* ── CANVAS AREA inside artboard ── */
  #canvas-wrap {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    transform-style: preserve-3d;
  }

  #outputSvg {
    position: absolute;
    top: 0; left: 0;
  }
  #previewSvg {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    display: none;
    z-index: 100;
  }

  .fragment-div {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    transform-style: preserve-3d;
    will-change: transform;
  }

  /* ── BOTTOM LEFT BUTTONS ── */
  #bottom-left {
    position: absolute;
    left: 40px;
    bottom: 24px;
    right: 40px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .nav-btn {
    position: relative;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--accent); border-color: var(--accent-border); }
  .nav-btn:active { transform: scale(0.96); }
  .nav-btn img, .nav-btn svg { width: 24px; height: 24px; }

  .nav-btn .nav-tooltip {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    text-align: center;
  }
  .nav-btn:hover .nav-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── BOTTOM CONTROLS ── */
  #bottom-controls {
    position: absolute;
    bottom: clamp(12px, 2.5vh, 24px);
    left: 50%;
    transform: translateX(-50%);
    width: 560px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    align-items: stretch;
  }

  /* Mode bar (top row) */
  #mode-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px 12px;
    position: relative;
    z-index: 2;
  }

  #mode-buttons {
    display: flex;
    flex: 1;
    flex-wrap: wrap;
    gap: 8px 12px;
    align-items: center;
  }

  .mode-btn {
    display: flex;
    gap: 4px;
    align-items: center;
    width: 160px;
    cursor: pointer;
    border: none;
    background: transparent;
    padding: 0;
    box-shadow: none;
    border-radius: 0;
  }

  .mode-btn .mode-icon {
    position: relative;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 15px;
    box-shadow: var(--shadow);
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .mode-btn .mode-icon img {
    width: 16px;
    height: 16px;
  }

  .mode-btn .mode-label {
    flex: 1;
    height: 40px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--dark);
    white-space: nowrap;
    box-shadow: var(--shadow);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    position: relative;
  }

  /* Active state */
  .mode-btn.active .mode-icon {
    background: var(--accent);
    border-color: var(--accent-border);
  }
  .mode-btn.active .mode-label {
    background: var(--accent);
    border-color: var(--accent-border);
    color: #000;
  }
  .mode-btn.active .mode-icon,
  .mode-btn.active .mode-label {
    box-shadow: var(--shadow);
  }

  /* Hover for inactive — accent tint */
  .mode-btn:not(.active):hover .mode-icon,
  .mode-btn:not(.active):hover .mode-label {
    background: var(--accent);
    border-color: var(--accent-border);
  }

  /* Cookie btn (randomize) */
  .cookie-btn {
    position: relative;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 2px;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .cookie-btn:hover { background: var(--accent); border-color: var(--accent-border); }
  .cookie-btn:active { transform: scale(0.96); }
  .cookie-btn img { width: 16px; height: 16px; }

  .cookie-btn .cookie-tooltip {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    text-align: center;
  }
  .cookie-btn:hover .cookie-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── SLIDER PANEL ── */
  #panel {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: clamp(16px, 4vh, 40px) clamp(20px, 4vw, 40px) clamp(24px, 6vh, 64px);
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    gap: clamp(12px, 2vh, 24px);
  }

  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 19px;
  }

  .slider-label {
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 0.02em;
    width: 100%;
  }

  .slider-track-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .slider-track {
    position: relative;
    height: 6px;
    background: #e0ddd8;
    border-radius: 3px;
    cursor: pointer;
    width: 100%;
    box-shadow: inset 0px 1px 2px rgba(0,0,0,0.25);
  }

  .slider-fill {
    position: absolute;
    left: 0; top: 0; height: 100%;
    background: var(--accent);
    border-radius: 3px;
    pointer-events: none;
    box-shadow: inset 0px 1px 2px rgba(0,0,0,0.25);
  }

  .slider-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--dark);
    cursor: grab;
    transition: box-shadow 0.1s, transform 0.1s;
    z-index: 2;
  }
  .slider-thumb:hover {
    box-shadow: 0 0 0 4px rgba(0,0,0,0.08);
    transform: translate(-50%, -50%) scale(1.15);
  }
  .slider-thumb:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.05); }

  #panel-b { display: none; }


  /* ── UPLOAD PROMPT (centered inside artboard) ── */
  #upload-prompt {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 10;
    cursor: pointer;
  }
  #upload-prompt.hidden {
    display: none;
  }
  .upload-prompt-btn {
    width: 40px;
    height: 40px;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 2px;
  }
  .upload-prompt-btn img {
    width: 24px;
    height: 24px;
    opacity: 0.35;
  }
  #upload-prompt-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--gray);
    text-align: center;
    white-space: nowrap;
  }

  /* ── COOKIE BTN DISABLED ── */
  .cookie-btn.disabled {
    opacity: 0.35;
    cursor: default;
    pointer-events: none;
  }

  /* ── CURSOR MODES ── */
  #canvas-wrap.cursor-hammer { cursor: url('assets/Hamer.png') 8 24, crosshair; }
  #canvas-wrap.cursor-knife  { cursor: url('assets/Knife.png') 8 24, crosshair; }
  #canvas-wrap.cursor-hammer.hammer-hit { cursor: none; }

  /* ── HAMMER HIT OVERLAY ── */
  .hammer-hit-overlay {
    position: fixed;
    width: 32px;
    height: 32px;
    pointer-events: none;
    z-index: 200;
    transform-origin: 8px 24px;
    transform: rotate(0deg);
    transition: transform 0.1s cubic-bezier(0.2, 0, 0.3, 1);
  }
  .hammer-hit-overlay.down {
    transform: rotate(-30deg);
  }
  .hammer-hit-overlay img {
    width: 100%;
    height: 100%;
  }

  /* ── LOGO WRAP (transparent on desktop) ── */
  #logo-wrap {
    display: contents;
  }

  /* ── RIGHT PANEL wrapper (transparent on desktop) ── */
  #right-panel {
    display: contents;
  }

  /* ── COPYRIGHT ── */
  #copyright {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--gray);
    text-align: left;
    line-height: 1.5;
    align-self: center;
  }

  /* file input hidden */
  #fileInput { display: none; }

  /* ── DRAG HINT for mode B ── */
  #drag-hint {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(-50% + 170px));
    font-size: 11px;
    color: var(--gray);
  }

  /* ── RESPONSIVE: side-by-side layout ── */
  /* ── RESPONSIVE: side-by-side ── */
  @media (max-width: 1400px) {
    #app {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      justify-content: flex-start;
      padding: 20px;
      gap: 20px;
      height: 100vh;
      min-height: 0;
    }

    /* Logo wrap: takes available vertical space, centers logo inside */
    #logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1 1 auto;
      min-height: 72px;
    }

    /* Logo: fills wrap by default, contracts on hover */
    #logo {
      position: relative;
      top: auto;
      left: auto;
      transform: none;
      width: 100%;
      height: 100%;
      min-height: auto;
      flex-shrink: 0;
    }
    /* Hover on WRAP contracts logo (wrap keeps stable size, no pulsing) */
    #logo:hover {
      width: 100%;
      height: 100%;
    }
    #logo-wrap:hover #logo {
      width: 90px;
      height: 72px;
    }

    /* Artboard: fills left side, 100% viewport height */
    #artboard {
      position: relative;
      top: auto;
      left: auto;
      bottom: auto;
      transform: none;
      width: auto;
      height: auto;
      max-height: none;
      min-height: 0;
      flex: 1 1 0;
      min-width: 0;
      align-self: stretch;
    }

    /* Right sidebar: 35%, same height as artboard */
    #right-panel {
      display: flex !important;
      flex-direction: column;
      width: 35%;
      min-width: 280px;
      max-width: 420px;
      flex-shrink: 0;
      gap: 20px;
      justify-content: flex-end;
      align-self: stretch;
    }

    /* Bottom controls */
    #bottom-controls {
      position: relative;
      bottom: auto;
      left: auto;
      transform: none;
      width: 100%;
    }

    /* Nav buttons */
    #bottom-left {
      position: relative;
      left: auto;
      bottom: auto;
      right: auto;
      justify-content: flex-start;
    }

    #mode-bar { align-items: stretch; gap: 8px; flex-wrap: nowrap; }
    #mode-buttons { flex-direction: column; gap: 8px; flex: 1; min-width: 0; flex-wrap: nowrap; }
    .mode-btn { width: 100%; min-width: 0; }
    .cookie-btn { width: 88px; height: auto; min-height: 88px; flex-shrink: 0; }
    .cookie-btn img { width: 24px; height: 24px; }
    .cookie-btn .cookie-tooltip { display: none; }
    .nav-btn .nav-tooltip { display: none; }

    #panel { padding: 24px 24px 40px; }

    /* Right panel — no clipping shadows */
    #right-panel { overflow: visible; }

    #copyright {
      text-align: left;
      margin-left: auto;
    }
  }

  /* ── RESPONSIVE: vertical stack ── */
  @media (max-width: 900px) {
    #app {
      flex-direction: column;
      align-items: stretch;
      padding: 14px 14px 30px;
      gap: 14px;
      min-height: 0;
      height: auto;
      overflow-y: auto;
    }

    /* Logo wrap: scrolls with content */
    #logo-wrap {
      position: relative;
      top: auto;
      left: auto;
      right: auto;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 72px;
      flex-shrink: 0;
    }

    /* Logo: fills wrap, contracts on wrap hover */
    #logo {
      position: relative;
      top: auto;
      left: auto;
      transform: none;
      width: 100%;
      height: 100%;
      min-height: auto;
      min-width: auto;
      flex-shrink: 0;
      transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    #logo:hover {
      width: 100%;
      height: 100%;
    }
    #logo-wrap:hover #logo {
      width: 90px;
      height: 72px;
    }

    /* Flatten right-panel so children participate in app flex order */
    #right-panel {
      display: contents !important;
    }

    #logo-wrap { order: 1; }
    #artboard { order: 2;
      position: relative;
      top: auto;
      left: auto;
      transform: none;
      width: 100%;
      height: auto;
      min-height: 200px;
      bottom: auto;
      aspect-ratio: 4 / 3;
      flex: 0 0 auto;
      overflow: visible;
    }

    #bottom-controls {
      position: relative;
      bottom: auto;
      left: auto;
      transform: none;
      width: 100%;
      order: 3;
    }

    #bottom-left {
      position: relative;
      left: auto;
      bottom: auto;
      right: auto;
      justify-content: flex-start;
      order: 4;
    }

    #mode-bar { align-items: stretch; gap: 8px; flex-wrap: nowrap; }
    #mode-buttons { flex-direction: column; gap: 8px; flex: 1; min-width: 0; flex-wrap: nowrap; }
    .mode-btn { width: 100%; min-width: 0; }
    .cookie-btn { width: 88px; height: auto; min-height: 88px; flex-shrink: 0; }
    .cookie-btn img { width: 24px; height: 24px; }

    #panel { padding: 24px 24px 40px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Artboard -->
  <div id="artboard">
    <div id="canvas-wrap" class="cursor-hammer">
      <svg id="outputSvg" xmlns="http://www.w3.org/2000/svg"></svg>
      <svg id="previewSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <!-- Upload prompt inside artboard -->
    <div id="upload-prompt">
      <button class="upload-prompt-btn" id="uploadBtnCenter" title="Upload file">
        <img src="assets/upload_file.svg" alt="Upload">
      </button>
      <span id="upload-prompt-label">Upload an *.svg file</span>
    </div>
  </div>

  <!-- RIGHT PANEL (used in responsive layout) -->
  <div id="right-panel">

  <!-- KHOREI LOGO -->
  <div id="logo-wrap">
  <a id="logo" href="https://khorei.com" target="_blank" rel="noopener">
    <div class="logo-row">
      <img src="assets/khorei_logo/K.svg" alt="K">
      <div class="logo-mid"><img src="assets/khorei_logo/H.svg" alt="H"></div>
      <img src="assets/khorei_logo/O.svg" alt="O">
    </div>
    <div class="logo-row">
      <img src="assets/khorei_logo/R.svg" alt="R">
      <div class="logo-mid"><img src="assets/khorei_logo/E.svg" alt="E"></div>
      <img src="assets/khorei_logo/I.svg" alt="I">
    </div>
    <div class="logo-row">
      <img src="assets/khorei_logo/L.svg" alt="L">
      <div class="logo-mid"><img src="assets/khorei_logo/A.svg" alt="A"></div>
      <img src="assets/khorei_logo/B.svg" alt="B">
    </div>
  </a>
  </div><!-- /logo-wrap -->

  <!-- BOTTOM CONTROLS -->
  <div id="bottom-controls">
    <!-- Mode bar -->
    <div id="mode-bar">
      <div id="mode-buttons">
        <button class="mode-btn active" id="btnA">
          <div class="mode-icon"><img src="assets/Hamer.png" alt="Hammer"></div>
          <div class="mode-label">Crush it</div>
        </button>
        <button class="mode-btn" id="btnB">
          <div class="mode-icon"><img src="assets/Knife.png" alt="Knife"></div>
          <div class="mode-label">Slice it</div>
        </button>
      </div>
      <button class="cookie-btn" id="randomBtn" title="Randomize">
        <img src="assets/Crisp.png" alt="Crisp">
        <span class="cookie-tooltip">Randomize</span>
      </button>
    </div>

    <!-- Slider panel -->
    <div id="panel">
      <!-- Panel A -->
      <div id="panel-a" class="slider-group">
        <div class="slider-row">
          <span class="slider-label">Power</span>
          <div class="slider-track-wrap">

<script>
document.getElementById('copy-year').textContent = new Date().getFullYear();

// ── SVG SANITIZER ──
// Sanitizer removed — client-side only app, no server interaction

// ── SLIDER LOGIC ──
function makeSlider(trackEl, thumbEl, fillEl, initial, onChange) {
  let val = initial;
  let dragging = false;

  function update(clientX) {
    const rect = trackEl.getBoundingClientRect();
    let p = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    val = p;
    thumbEl.style.left = (p * 100) + '%';
    fillEl.style.width = (p * 100) + '%';
    onChange(p);
  }

  trackEl.addEventListener('mousedown', e => { dragging = true; update(e.clientX); e.preventDefault(); });
  window.addEventListener('mousemove', e => { if (dragging) update(e.clientX); });
  window.addEventListener('mouseup', () => { dragging = false; });
  trackEl.addEventListener('touchstart', e => { dragging = true; update(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
  window.addEventListener('touchmove', e => { if (dragging) update(e.touches[0].clientX); });
  window.addEventListener('touchend', () => { dragging = false; });

  return { get: () => val };
}

const sliderPowerA = makeSlider(
  document.getElementById('trackPowerA'),
  document.getElementById('thumbPowerA'),
  document.getElementById('fillPowerA'),
  0.30, () => {}
);
const sliderCrisp = makeSlider(
  document.getElementById('trackCrisp'),
  document.getElementById('thumbCrisp'),
  document.getElementById('fillCrisp'),
  0.50, () => {}
);
const sliderPowerB = makeSlider(
  document.getElementById('trackPowerB'),
  document.getElementById('thumbPowerB'),
  document.getElementById('fillPowerB'),
  0.35, () => {}
);
const sliderJagged = makeSlider(
  document.getElementById('trackJagged'),
  document.getElementById('thumbJagged'),
  document.getElementById('fillJagged'),
  0.45, () => {}
);

// helpers: map 0..1 to range
const mapVal = (v, min, max) => min + v * (max - min);

// ── STATE ──
let originalSvgContent = null;
let svgW = 400, svgH = 400;
let particles = [];
let rafId = null;
let mode = 'A';
let voronoiPointsA = [];
let allBreakPts = [];
let allBreakMeta = [];
let isDragging = false;
let dragStart = null, dragEnd = null;
let colorImageData = null;

const canvasWrap = document.getElementById('canvas-wrap');
const outputSvg = document.getElementById('outputSvg');
const previewSvg = document.getElementById('previewSvg');
const uploadPrompt = document.getElementById('upload-prompt');
const randomBtn = document.getElementById('randomBtn');

// Start with randomizer disabled
randomBtn.classList.add('disabled');

// ── COLOR SAMPLING ──
function prepareColorSampling() {
  return new Promise(resolve => {
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(svgW);
    canvas.height = Math.round(svgH);
    const ctx = canvas.getContext('2d');
    const img = new Image();
    const blob = new Blob([originalSvgContent], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      ctx.drawImage(img, 0, 0, svgW, svgH);
      try {
        colorImageData = ctx.getImageData(0, 0, Math.round(svgW), Math.round(svgH));
      } catch (e) {
        colorImageData = null;
      }
      URL.revokeObjectURL(url);
      resolve();
    };
    img.onerror = () => {
      colorImageData = null;
      URL.revokeObjectURL(url);
      resolve();
    };
    img.src = url;
  });
}

function sampleColor(x, y) {
  if (!colorImageData) return '#555555';
  const w = colorImageData.width;
  const h = colorImageData.height;
  const px = Math.round(Math.max(0, Math.min(w - 1, x)));
  const py = Math.round(Math.max(0, Math.min(h - 1, y)));
  let rSum = 0, gSum = 0, bSum = 0, count = 0;
  for (let dy = -2; dy <= 2; dy++) {
    for (let dx = -2; dx <= 2; dx++) {
      const sx = Math.max(0, Math.min(w - 1, px + dx));
      const sy = Math.max(0, Math.min(h - 1, py + dy));
      const idx = (sy * w + sx) * 4;
      const a = colorImageData.data[idx + 3];
      if (a > 20) {
        rSum += colorImageData.data[idx];
        gSum += colorImageData.data[idx + 1];
        bSum += colorImageData.data[idx + 2];
        count++;
      }
    }
  }
  if (count === 0) return '#555555';
  return `rgb(${Math.round(rSum / count)},${Math.round(gSum / count)},${Math.round(bSum / count)})`;
}

function generateJaggedPolygon(numVerts, size) {
  const verts = [];
  for (let i = 0; i < numVerts; i++) {
    const baseAngle = (i / numVerts) * Math.PI * 2;
    const angle = baseAngle + rand(-0.5, 0.5);
    const r = size * rand(0.35, 1.0);
    verts.push([Math.cos(angle) * r, Math.sin(angle) * r]);
  }
  return verts;
}

// ── MODE TOGGLE ──
document.getElementById('btnA').addEventListener('click', () => setMode('A'));
document.getElementById('btnB').addEventListener('click', () => setMode('B'));

function setMode(m) {
  mode = m;
  document.getElementById('btnA').classList.toggle('active', m === 'A');
  document.getElementById('btnB').classList.toggle('active', m === 'B');
  document.getElementById('panel-a').style.display = m === 'A' ? 'flex' : 'none';
  document.getElementById('panel-b').style.display = m === 'B' ? 'flex' : 'none';

  // Cursor swap
  canvasWrap.classList.toggle('cursor-hammer', m === 'A');
  canvasWrap.classList.toggle('cursor-knife', m === 'B');

  if (originalSvgContent) resetState();
}

// ── FILE UPLOAD ──
document.getElementById('uploadBtn').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});
document.getElementById('upload-prompt').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    originalSvgContent = ev.target.result;
    const doc = new DOMParser().parseFromString(originalSvgContent, 'image/svg+xml');
    const svgEl = doc.querySelector('svg');
    if (!svgEl) return;
    const vb = svgEl.getAttribute('viewBox');
    if (vb) {
      const p = vb.trim().split(/[\s,]+/);
      svgW = parseFloat(p[2]) || 400;
      svgH = parseFloat(p[3]) || 400;
    } else {
      svgW = parseFloat(svgEl.getAttribute('width')) || 400;
      svgH = parseFloat(svgEl.getAttribute('height')) || 400;
    }
    await prepareColorSampling();
    resetState();
    uploadPrompt.classList.add('hidden');
    document.getElementById('artboard').classList.add('has-file');
    randomBtn.classList.remove('disabled');
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ── RESET ──
document.getElementById('resetBtn').addEventListener('click', () => {
  if (originalSvgContent) resetState();
});

function clearFragments() {
  canvasWrap.querySelectorAll('.fragment-div').forEach(el => el.remove());
}

function resetState() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  particles = []; voronoiPointsA = []; allBreakPts = []; allBreakMeta = [];
  isDragging = false; dragStart = dragEnd = null;
  previewSvg.style.display = 'none';
  previewSvg.innerHTML = '';
  clearFragments();
  outputSvg.style.display = 'block';
  renderOriginal();
}

// ── DOWNLOAD ──
document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!originalSvgContent) return;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

  let str;
  if (particles.length === 0) {
    str = new XMLSerializer().serializeToString(outputSvg);
  } else {
    const ns = 'http://www.w3.org/2000/svg';
    const cW = canvasWrap.clientWidth, cH = canvasWrap.clientHeight;
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('xmlns', ns);
    svg.setAttribute('width', cW);
    svg.setAttribute('height', cH);
    svg.setAttribute('viewBox', `0 0 ${cW} ${cH}`);
    particles.forEach(p => {
      const innerSvg = p.el.querySelector('svg');
      if (!innerSvg) return;
      const g = document.createElementNS(ns, 'g');
      const tx = p.px - p.screenCx;
      const ty = p.py - p.screenCy;
      g.setAttribute('transform', `translate(${tx},${ty}) rotate(${p.rot},${p.screenCx},${p.screenCy})`);
      g.innerHTML = innerSvg.innerHTML;
      svg.appendChild(g);
    });
    str = new XMLSerializer().serializeToString(svg);
  }

  const blob = new Blob([str], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'crisp-output.svg'; a.click();
  URL.revokeObjectURL(url);
});

// ── RANDOM (cookie) ──
document.getElementById('randomBtn').addEventListener('click', () => {
  if (!originalSvgContent) return;
  // Random click somewhere on the SVG
  const rx = rand(svgW * 0.15, svgW * 0.85);
  const ry = rand(svgH * 0.15, svgH * 0.85);
  if (mode === 'A') {
    triggerModeA(rx, ry);
  } else {
    const scale = getScale();
    const { offX, offY } = getOff(scale);
    const sA = { x: offX + rand(0, svgW * 0.3) * scale, y: offY + rand(0, svgH) * scale };
    const sB = { x: offX + rand(svgW * 0.7, svgW) * scale, y: offY + rand(0, svgH) * scale };
    triggerModeB(sA, sB);
  }
});

// ── RENDER ──
function getScale() {
  return Math.min(canvasWrap.clientWidth / svgW, canvasWrap.clientHeight / svgH) * 0.60;
}
function getOff(s) {
  return {
    offX: (canvasWrap.clientWidth - svgW * s) / 2,
    offY: (canvasWrap.clientHeight - svgH * s) / 2
  };
}

function renderOriginal() {
  const parser = new DOMParser();
  const srcSvg = parser.parseFromString(originalSvgContent, 'image/svg+xml').querySelector('svg');
  const scale = getScale(); const { offX, offY } = getOff(scale);
  const cW = canvasWrap.clientWidth, cH = canvasWrap.clientHeight;
  outputSvg.style.display = 'block';
  outputSvg.setAttribute('width', cW); outputSvg.setAttribute('height', cH);
  outputSvg.setAttribute('viewBox', `0 0 ${cW} ${cH}`);
  while (outputSvg.firstChild) outputSvg.removeChild(outputSvg.firstChild);
  previewSvg.setAttribute('width', cW); previewSvg.setAttribute('height', cH);
  previewSvg.setAttribute('viewBox', `0 0 ${cW} ${cH}`);
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('transform', `translate(${offX},${offY}) scale(${scale})`);
  // Use importNode to preserve namespaced attributes (xlink:href for embedded images)
  Array.from(srcSvg.childNodes).forEach(child => {
    g.appendChild(document.importNode(child, true));
  });
  outputSvg.appendChild(g);
}

// ── ARTBOARD POSITION: keep 20px gap above controls ──
function updateArtboardBottom() {
  if (window.innerWidth <= 1400) return; // only desktop
  const controls = document.getElementById('bottom-controls');
  if (!controls) return;
  const rect = controls.getBoundingClientRect();
  const artboard = document.getElementById('artboard');
  artboard.style.bottom = (window.innerHeight - rect.top + 20) + 'px';
}
updateArtboardBottom();
window.addEventListener('resize', updateArtboardBottom);

// ── RESIZE: re-center SVG on window resize ──
let resizeTimer = null;
window.addEventListener('resize', () => {
  if (!originalSvgContent) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (voronoiPointsA.length > 0 && mode === 'A') {
      buildAndRender(voronoiPointsA);
    } else if (allBreakPts.length > 0 && mode === 'B') {
      buildAndRender(allBreakPts);
    } else {
      renderOriginal();
    }
  }, 100);
});

// ── TOUCH helper ──
function touchPos(e) {
  const t = e.touches[0] || e.changedTouches[0];
  const r = canvasWrap.getBoundingClientRect();
  return { x: t.clientX - r.left, y: t.clientY - r.top, clientX: t.clientX, clientY: t.clientY };
}

/// ── TOUCH: Slice (mode B) ──
canvasWrap.addEventListener('touchstart', e => {
  if (!originalSvgContent || mode !== 'B') return;
  if (e.target.closest('#panel') || e.target.closest('#bottom-left')) return;
  e.preventDefault();
  isDragging = true;
  const p = touchPos(e);
  dragStart = { x: p.x, y: p.y }; dragEnd = { x: p.x, y: p.y };
  previewSvg.style.display = 'block'; previewSvg.innerHTML = '';
}, { passive: false });

canvasWrap.addEventListener('touchmove', e => {
  if (!isDragging || mode !== 'B') return;
  e.preventDefault();
  const p = touchPos(e);
  dragEnd = { x: p.x, y: p.y }; drawPreview(dragStart, dragEnd);
}, { passive: false });

canvasWrap.addEventListener('touchend', e => {
  if (!isDragging || mode !== 'B') return;
  isDragging = false;
  const p = touchPos(e);
  dragEnd = { x: p.x, y: p.y };
  previewSvg.innerHTML = ''; previewSvg.style.display = 'none';
  const dx = dragEnd.x - dragStart.x, dy = dragEnd.y - dragStart.y;
  if (Math.sqrt(dx * dx + dy * dy) < 8) return;
  triggerModeB(dragStart, dragEnd);
});

// ── TOUCH: Crush (mode A) ──
canvasWrap.addEventListener('touchstart', e => {
  if (!originalSvgContent || mode !== 'A') return;
  e.preventDefault();
  const p = touchPos(e);
  const scale = getScale(); const { offX, offY } = getOff(scale);
  triggerModeA((p.x - offX) / scale, (p.y - offY) / scale);
}, { passive: false });

// ── EVENTS on canvas ──
canvasWrap.addEventListener('mousedown', e => {
  if (!originalSvgContent || mode !== 'B') return;
  if (e.target.closest('#panel') || e.target.closest('#bottom-left')) return;
  isDragging = true;
  dragStart = canvasPos(e); dragEnd = canvasPos(e);
  previewSvg.style.display = 'block'; previewSvg.innerHTML = '';
});
canvasWrap.addEventListener('mousemove', e => {
  if (!isDragging || mode !== 'B') return;
  dragEnd = canvasPos(e); drawPreview(dragStart, dragEnd);
});
canvasWrap.addEventListener('mouseup', e => {
  if (!isDragging || mode !== 'B') return;
  isDragging = false; dragEnd = canvasPos(e);
  previewSvg.innerHTML = ''; previewSvg.style.display = 'none';
  const dx = dragEnd.x - dragStart.x, dy = dragEnd.y - dragStart.y;
  if (Math.sqrt(dx * dx + dy * dy) < 8) return;
  triggerModeB(dragStart, dragEnd);
});
canvasWrap.addEventListener('mouseleave', () => {
  if (isDragging && mode === 'B') {
    isDragging = false; previewSvg.innerHTML = ''; previewSvg.style.display = 'none';
  }
});
canvasWrap.addEventListener('click', e => {
  if (!originalSvgContent || mode !== 'A') return;
  const scale = getScale(); const { offX, offY } = getOff(scale);
  const pos = canvasPos(e);
  triggerModeA((pos.x - offX) / scale, (pos.y - offY) / scale);
});

// ── HAMMER HIT (mousedown/mouseup) ──
let hammerOverlay = null;

function createHammerOverlay() {
  const el = document.createElement('div');
  el.className = 'hammer-hit-overlay';
  const img = document.createElement('img');
  img.src = 'assets/Hamer.png';
  el.appendChild(img);
  document.body.appendChild(el);
  return el;
}

canvasWrap.addEventListener('mousedown', e => {
  if (!originalSvgContent || mode !== 'A') return;
  canvasWrap.classList.add('hammer-hit');
  hammerOverlay = createHammerOverlay();
  hammerOverlay.style.left = (e.clientX - 8) + 'px';
  hammerOverlay.style.top = (e.clientY - 24) + 'px';
  requestAnimationFrame(() => hammerOverlay.classList.add('down'));
});

window.addEventListener('mousemove', e => {
  if (hammerOverlay) {
    hammerOverlay.style.left = (e.clientX - 8) + 'px';
    hammerOverlay.style.top = (e.clientY - 24) + 'px';
  }
});

window.addEventListener('mouseup', () => {
  if (hammerOverlay) {
    hammerOverlay.classList.remove('down');
    setTimeout(() => {
      if (hammerOverlay) { hammerOverlay.remove(); hammerOverlay = null; }
      canvasWrap.classList.remove('hammer-hit');
    }, 100);
  }
});

function canvasPos(e) {
  const r = canvasWrap.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function drawPreview(a, b) {
  previewSvg.innerHTML = '';
  const dx = b.x - a.x, dy = b.y - a.y, len = Math.sqrt(dx * dx + dy * dy) || 1;
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', a.x - (dx / len) * 2000); line.setAttribute('y1', a.y - (dy / len) * 2000);
  line.setAttribute('x2', a.x + (dx / len) * 2000); line.setAttribute('y2', a.y + (dy / len) * 2000);
  line.setAttribute('stroke', '#e87040');
  line.setAttribute('stroke-width', '1');
  line.setAttribute('stroke-dasharray', '6 6');
  line.setAttribute('opacity', '0.7');
  previewSvg.appendChild(line);
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('cx', b.x); dot.setAttribute('cy', b.y);
  dot.setAttribute('r', '4'); dot.setAttribute('fill', 'rgba(0,0,0,0.3)');
  previewSvg.appendChild(dot);
}

// ── VORONOI ──
function rand(a, b) { return a + Math.random() * (b - a); }

function convexHull(pts) {
  if (pts.length < 3) return pts;
  pts = pts.slice().sort((a, b) => a[0] - b[0] || a[1] - b[1]);
  const cross = (o, a, b) => (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0]);
  const lo = [], up = [];
  for (const p of pts) { while (lo.length >= 2 && cross(lo[lo.length - 2], lo[lo.length - 1], p) <= 0) lo.pop(); lo.push(p); }
  for (let i = pts.length - 1; i >= 0; i--) { const p = pts[i]; while (up.length >= 2 && cross(up[up.length - 2], up[up.length - 1], p) <= 0) up.pop(); up.push(p); }
  up.pop(); lo.pop(); return lo.concat(up);
}
function hullArea(h) {
  let a = 0;
  for (let i = 0; i < h.length; i++) { const j = (i + 1) % h.length; a += h[i][0] * h[j][1] - h[j][0] * h[i][1]; }
  return Math.abs(a) / 2;
}
function getVoronoiCells(pts, w, h, res = 130) {
  const cells = pts.map(() => []);
  const sw = w / res, sh = h / res;
  for (let gx = 0; gx <= res; gx++) for (let gy = 0; gy <= res; gy++) {
    const px = gx * sw, py = gy * sh; let minD = Infinity, minI = 0;
    pts.forEach((p, i) => { const d = (px - p[0]) ** 2 + (py - p[1]) ** 2; if (d < minD) { minD = d; minI = i; } });
    cells[minI].push([px, py]);
  }
  return cells;
}

// ── BUILD & RENDER (div+svg fragments) ──
function buildAndRender(vpts) {
  const parser = new DOMParser();
  const innerHTML = parser.parseFromString(originalSvgContent, 'image/svg+xml').querySelector('svg').innerHTML;
  const scale = getScale(); const { offX, offY } = getOff(scale);
  const cW = canvasWrap.clientWidth, cH = canvasWrap.clientHeight;

  outputSvg.style.display = 'none';
  clearFragments();
  particles = [];

  const cells = getVoronoiCells(vpts, svgW, svgH);
  const totalArea = svgW * svgH;
  const ns = 'http://www.w3.org/2000/svg';
  const clipIdBase = Date.now();

  vpts.forEach((pt, i) => {
    const hull = convexHull(cells[i]);
    if (hull.length < 3) return;
    const sf = hullArea(hull) / totalArea;
    if (sf < 0.002) return;

    const hcx = hull.reduce((s, p) => s + p[0], 0) / hull.length;
    const hcy = hull.reduce((s, p) => s + p[1], 0) / hull.length;
    const scx = offX + hcx * scale;
    const scy = offY + hcy * scale;
    const isCrumb = sf < 0.03 && mode === 'A';

    const div = document.createElement('div');
    div.className = 'fragment-div';
    div.style.width = cW + 'px';
    div.style.height = cH + 'px';
    div.style.transformOrigin = scx + 'px ' + scy + 'px';

    if (isCrumb) {
      const color = sampleColor(hcx, hcy);
      const crumbSize = rand(2, 7) * scale;
      const numVerts = Math.floor(rand(5, 9));
      const verts = generateJaggedPolygon(numVerts, crumbSize);

      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('width', cW);
      svg.setAttribute('height', cH);
      svg.setAttribute('viewBox', `0 0 ${cW} ${cH}`);
      svg.style.cssText = 'position:absolute;top:0;left:0;overflow:visible;';

      const polygon = document.createElementNS(ns, 'polygon');
      const polyPoints = verts.map(p => (scx + p[0]) + ',' + (scy + p[1])).join(' ');
      polygon.setAttribute('points', polyPoints);
      polygon.setAttribute('fill', color);
      svg.appendChild(polygon);
      div.appendChild(svg);
    } else {
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('width', cW);
      svg.setAttribute('height', cH);
      svg.setAttribute('viewBox', `0 0 ${cW} ${cH}`);
      svg.style.cssText = 'position:absolute;top:0;left:0;';

      const defs = document.createElementNS(ns, 'defs');
      const clipId = `clip_${clipIdBase}_${i}`;
      const clip = document.createElementNS(ns, 'clipPath');
      clip.setAttribute('id', clipId);
      const poly = document.createElementNS(ns, 'polygon');
      poly.setAttribute('points', hull.map(p => p.join(',')).join(' '));
      clip.appendChild(poly);
      defs.appendChild(clip);
      svg.appendChild(defs);

      const outerG = document.createElementNS(ns, 'g');
      outerG.setAttribute('transform', `translate(${offX},${offY}) scale(${scale})`);
      const cellG = document.createElementNS(ns, 'g');
      cellG.setAttribute('clip-path', `url(#${clipId})`);
      cellG.innerHTML = innerHTML;
      outerG.appendChild(cellG);
      svg.appendChild(outerG);
      div.appendChild(svg);
    }

    canvasWrap.appendChild(div);

    particles.push({
      el: div, cx: hcx, cy: hcy,
      screenCx: scx, screenCy: scy,
      px: scx, py: scy,
      rot: 0, rx: 0, ry: 0,
      targetRx: 0, targetRy: 0,
      vx: 0, vy: 0, vr: 0,
      scale, offX, offY, sf,
      isCrumb
    });
  });

  applyTransforms();
}

function applyTransforms() {
  particles.forEach(p => {
    const tx = p.px - p.screenCx;
    const ty = p.py - p.screenCy;
    p.el.style.transform = `perspective(600px) translate(${tx}px, ${ty}px) rotateX(${p.rx}deg) rotateY(${p.ry}deg) rotateZ(${p.rot}deg)`;
  });
}

// ── MODE A ──
function triggerModeA(clickX, clickY) {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  const power = mapVal(sliderPowerA.get(), 0.001, 20);
  const crisp = mapVal(sliderCrisp.get(), 1, 10);

  const bigCount = 2 + Math.floor(crisp * 0.3);
  for (let i = 0; i < bigCount; i++) {
    const r = rand(svgW * 0.06, svgW * 0.3), a = rand(0, Math.PI * 2);
    voronoiPointsA.push([Math.max(1, Math.min(svgW - 1, clickX + Math.cos(a) * r)), Math.max(1, Math.min(svgH - 1, clickY + Math.sin(a) * r))]);
  }
  for (let i = 0; i < 6 + crisp * 3; i++) {
    const r = rand(1, svgW * 0.08), a = rand(0, Math.PI * 2);
    voronoiPointsA.push([Math.max(1, Math.min(svgW - 1, clickX + Math.cos(a) * r)), Math.max(1, Math.min(svgH - 1, clickY + Math.sin(a) * r))]);
  }

  buildAndRender(voronoiPointsA);
  const scale = getScale(); const { offX, offY } = getOff(scale);
  const fromSX = offX + clickX * scale, fromSY = offY + clickY * scale;
  const maxSpeed = 0.002 + (power / 20) * 2.5;
  const maxAngle = mapVal(sliderPowerA.get(), 0.5, 38);

  particles.forEach(p => {
    const dx = p.screenCx - fromSX, dy = p.screenCy - fromSY, dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const isSmall = p.sf < 0.03;
    const speed = isSmall ? maxSpeed * rand(0.8, 2.0) : maxSpeed * rand(0.3, 0.8);
    p.vx = (dx / dist) * speed + rand(-1, 1) * speed * 0.3;
    p.vy = (dy / dist) * speed + rand(-1, 1) * speed * 0.3;
    p.vr = rand(-1, 1) * (isSmall ? 0.8 : 0.2);

    const angle = Math.atan2(dy, dx);
    const rotAmount = isSmall ? maxAngle * rand(0.6, 1.0) : maxAngle * rand(0.3, 0.8);
    p.targetRy = Math.cos(angle) * rotAmount;
    p.targetRx = -Math.sin(angle) * rotAmount * 0.7;
  });
  animate();
}

// ── MODE B ──
function buildBreakPts(sA, sB, jagged) {
  const scale = getScale(); const { offX, offY } = getOff(scale);
  const ax = (sA.x - offX) / scale, ay = (sA.y - offY) / scale;
  const bx = (sB.x - offX) / scale, by = (sB.y - offY) / scale;
  const dx = bx - ax, dy = by - ay, len = Math.sqrt(dx * dx + dy * dy) || 1;
  const ext = Math.sqrt(svgW * svgW + svgH * svgH) * 0.85;
  const ox = ax - (dx / len) * ext, oy = ay - (dy / len) * ext;
  const ex = ax + (dx / len) * ext, ey = ay + (dy / len) * ext;
  const angle = Math.atan2(dy, dx);
  const perp = angle + Math.PI / 2;
  const cx = (ax + bx) / 2, cy = (ay + by) / 2;
  const totalLen = Math.sqrt((ex - ox) ** 2 + (ey - oy) ** 2);

  if (jagged <= 1.1) {
    const gap = svgW * 0.006;
    return {
      pts: [
        [cx + Math.cos(perp) * gap, cy + Math.sin(perp) * gap],
        [cx - Math.cos(perp) * gap, cy - Math.sin(perp) * gap]
      ],
      perp, cx, cy, ax, ay, bx, by
    };
  }

  const t = (jagged - 1) / 9;
  const teeth = Math.round(2 + t * 20);
  const amplitude = svgW * (0.008 + t * 0.082);
  const gap = svgW * (0.005 + t * 0.012);
  const ph1A = rand(0, Math.PI * 2), ph2A = rand(0, Math.PI * 2), ph3A = rand(0, Math.PI * 2);
  const ph1B = rand(0, Math.PI * 2), ph2B = rand(0, Math.PI * 2), ph3B = rand(0, Math.PI * 2);
  const f1 = teeth * 2.2 / totalLen, f2 = f1 * 1.8, f3 = f1 * 3.5;

  const pts = [];
  for (let i = 0; i <= teeth; i++) {
    const tt = i / teeth;
    const lx = ox + (ex - ox) * tt, ly = oy + (ey - oy) * tt;
    const d = tt * totalLen;
    const profA = amplitude * (0.55 * Math.sin(d * f1 + ph1A) + 0.3 * Math.sin(d * f2 + ph2A) + 0.15 * Math.sin(d * f3 + ph3A));
    const profB = amplitude * (0.55 * Math.sin(d * f1 + ph1B) + 0.3 * Math.sin(d * f2 + ph2B) + 0.15 * Math.sin(d * f3 + ph3B));
    pts.push([lx + Math.cos(perp) * (gap + profA), ly + Math.sin(perp) * (gap + profA)]);
    pts.push([lx - Math.cos(perp) * (gap + profB), ly - Math.sin(perp) * (gap + profB)]);
  }
  return { pts, perp, cx, cy, ax, ay, bx, by };
}

function triggerModeB(sA, sB) {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  const power = mapVal(sliderPowerB.get(), 0.025, 0.6);
  const jagged = mapVal(sliderJagged.get(), 1, 10);

  const { pts, perp, cx, cy, ax, ay, bx, by } = buildBreakPts(sA, sB, jagged);
  allBreakPts.push(...pts);
  allBreakMeta.push({ perp, cx, cy });

  buildAndRender(allBreakPts);

  const breakDx = bx - ax, breakDy = by - ay;
  const breakLen = Math.sqrt(breakDx * breakDx + breakDy * breakDy) || 1;

  let maxDist = 0;
  particles.forEach(p => {
    const d = Math.abs((p.cx - ax) * breakDy - (p.cy - ay) * breakDx) / breakLen;
    if (d > maxDist) maxDist = d;
  });

  const maxAngle = 35;
  const perpX = Math.cos(perp), perpY = Math.sin(perp);

  particles.forEach(p => {
    const dx = p.cx - cx, dy = p.cy - cy;
    const sign = (dx * perpX + dy * perpY) >= 0 ? 1 : -1;

    p.vx = perpX * sign * power * rand(0.85, 1.15);
    p.vy = perpY * sign * power * rand(0.85, 1.15);
    p.vr = rand(-1, 1) * 0.006 * (jagged / 10);

    const dist = Math.abs((p.cx - ax) * breakDy - (p.cy - ay) * breakDx) / breakLen;
    const normalizedDist = maxDist > 0 ? dist / maxDist : 0;
    const droopAmount = normalizedDist * normalizedDist * maxAngle * rand(0.8, 1.0);
    p.targetRx = droopAmount;
    p.targetRy = sign * normalizedDist * 8 * rand(0.5, 1.0);
  });
  animate();
}

// ── ANIMATION ──
function animate() {
  const cW = canvasWrap.clientWidth, cH = canvasWrap.clientHeight;
  let anyMoving = false;
  particles.forEach(p => {
    const isSmall = p.sf < 0.03;
    const friction = isSmall ? 0.88 : 0.94;
    p.vx *= friction; p.vy *= friction; p.vr *= 0.92;
    p.px += p.vx; p.py += p.vy; p.rot += p.vr;

    p.rx += (p.targetRx - p.rx) * 0.07;
    p.ry += (p.targetRy - p.ry) * 0.07;

    if (p.px < 0) { p.px = 0; p.vx = Math.abs(p.vx) * 0.2; }
    if (p.px > cW) { p.px = cW; p.vx = -Math.abs(p.vx) * 0.2; }
    if (p.py < 0) { p.py = 0; p.vy = Math.abs(p.vy) * 0.2; }
    if (p.py > cH) { p.py = cH; p.vy = -Math.abs(p.vy) * 0.1; }

    if (Math.sqrt(p.vx ** 2 + p.vy ** 2) > 0.005 || Math.abs(p.vr) > 0.003 ||
        Math.abs(p.targetRx - p.rx) > 0.15 || Math.abs(p.targetRy - p.ry) > 0.15) {
      anyMoving = true;
    }
  });
  applyTransforms();
  if (anyMoving) rafId = requestAnimationFrame(animate);
  else rafId = null;
}
</script>
